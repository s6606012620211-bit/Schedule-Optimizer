<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SFP Schedule Manager v89b</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══ RESET ═══ */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sarabun',sans-serif;background:#0d1117;font-size:12px;color:#c9d1d9;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ═══ TOP BAR ═══ */
.topbar{background:#161b22;border-bottom:1px solid #30363d;display:flex;align-items:center;height:46px;padding:0 14px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.tb-logo{font-size:13px;font-weight:700;color:#58a6ff;letter-spacing:.5px;margin-right:20px;white-space:nowrap}
.tb-nav{display:flex}
.tb-tab{height:46px;padding:0 14px;display:flex;align-items:center;font-size:12px;font-weight:500;color:#8b949e;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap}
.tb-tab:hover{color:#c9d1d9;background:rgba(255,255,255,.04)}
.tb-tab.on{color:#e6b84a;border-bottom-color:#e6b84a}
.tb-kpis{display:flex;gap:18px;margin-left:auto;align-items:center}
.kpi{display:flex;flex-direction:column;align-items:flex-end}
.kpi-v{font-size:15px;font-weight:700;line-height:1;font-family:monospace}
.kpi-l{font-size:9px;opacity:.55;text-transform:uppercase;letter-spacing:.5px;margin-top:1px}

/* ═══ VIEWS ═══ */
.view{display:none;flex:1;overflow:hidden}.view.on{display:flex;flex-direction:column}#v-home.on{overflow-y:auto;overflow-x:hidden}#v-set.on{overflow:hidden}#v-ov.on{overflow-y:auto;overflow-x:hidden;flex-direction:column}

/* ═══════════════════════════════════════════════
   SCHEDULE VIEW — LEFT sidebar + RIGHT (gantt + table)
═══════════════════════════════════════════════ */
#v-sch{flex-direction:row}

/* LEFT: day list */
.sch-left{width:240px;min-width:200px;background:#0e1520;border-right:1px solid #1e2a3a;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sl-hdr{padding:9px 13px;border-bottom:1px solid #1e2a3a;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#3a7bd5;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.sl-total{color:#f0883e;font-family:monospace}
.day-list{flex:1;overflow-y:auto}
.dr{display:flex;align-items:center;gap:7px;padding:6px 13px;border-bottom:1px solid #111820;cursor:pointer;transition:background .1s}
.dr:hover{background:#121c2a}.dr.sel{background:#0d2040}
.dr-num{width:22px;font-family:monospace;font-size:13px;font-weight:700}
.dr-dow{width:26px;font-size:9px;color:#3a5070;text-transform:uppercase;letter-spacing:.5px}
.dr-bar{flex:1;height:3px;background:#151d2a;border-radius:2px;overflow:hidden}
.dr-fill{height:100%;border-radius:2px}
.dr-end{font-family:monospace;font-size:10px;min-width:40px;text-align:right}
.dr-ot{font-size:9px;color:#f0883e}.dr-ovr{font-size:9px;color:#e6b84a;margin-left:2px}

/* RIGHT panel */
.sch-right{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ─── GANTT SECTION ─── */
.gantt-panel{flex:0 0 auto;display:flex;flex-direction:column;background:#0b1117;border-bottom:2px solid #1e2a3a}
.gantt-hdr{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid #1e2a3a;flex-shrink:0}
.gh-day{font-size:14px;font-weight:700;color:#e6edf3;font-family:monospace}
.gh-date{font-size:11px;color:#3a5070}
.gh-stat{margin-left:auto;font-family:monospace;font-size:11px;color:#6a8099}
.gh-ot{color:#f0883e;font-weight:700}
.gantt-body{padding:10px 14px 12px;overflow-y:auto;max-height:280px}

/* time axis */
.g-axis{display:flex;justify-content:space-between;padding-left:132px;margin-bottom:5px}
.g-axis span{font-family:monospace;font-size:9px;color:#2a4060}

/* total bar */
.g-total{display:flex;align-items:center;margin-bottom:8px;gap:0}
.g-lbl-total{width:132px;flex-shrink:0;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#2a5090;text-align:right;padding-right:10px}
.g-track{flex:1;height:9px;background:#111820;border-radius:3px;overflow:hidden;position:relative;border:1px solid #1a2438}
.g-total-fill{height:100%;background:linear-gradient(90deg,#1f6feb 0%,#a371f7 40%,#f47067 70%,#f0883e 100%);border-radius:3px}
.g-cutoff{position:absolute;right:0;top:-2px;bottom:-2px;width:2px;background:#f47067;opacity:.5}
.g-time-end{font-family:monospace;font-size:9px;color:#4a607a;width:75px;text-align:right;padding-left:7px;flex-shrink:0;white-space:nowrap}

/* section label */
.g-sep{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#1e3a5a;display:flex;align-items:center;gap:6px;margin:7px 0 4px}
.g-sep::after{content:'';flex:1;height:1px;background:#111820}

/* material rows */
.g-row{display:flex;align-items:center;gap:0;margin-bottom:4px}
.g-mat-lbl{width:132px;flex-shrink:0;display:flex;align-items:center;gap:6px;padding-right:10px}
.g-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.g-name{font-size:11px;color:#6a8099;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.g-track-row{flex:1;height:7px;background:#111820;border-radius:2px;overflow:visible;position:relative;border:1px solid #151d2a}
.g-bar{position:absolute;top:0;height:100%;border-radius:2px;cursor:pointer;transition:filter .12s}
.g-bar:hover{filter:brightness(1.25)}
.g-end21{position:absolute;right:0;top:-3px;bottom:-3px;width:1.5px;background:#f47067;opacity:.3;pointer-events:none}
.g-row-time{font-family:monospace;font-size:9px;color:#3a5070;width:75px;text-align:right;padding-left:7px;flex-shrink:0;white-space:nowrap}

/* ─── TABLE SECTION (collapsible) ─── */
.tbl-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.tbl-toggle{background:#0e1520;border-bottom:1px solid #1e2a3a;padding:6px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0;user-select:none}
.tbl-toggle:hover{background:#111d2a}
.tt-arrow{font-size:10px;color:#3a5070;width:12px}
.tt-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#3a7bd5}
.tt-wk{margin-left:auto;font-size:10px;color:#3a5070}
.wb-btn{padding:3px 10px;background:#1a2438;color:#58a6ff;border:1px solid #2a3a52;border-radius:4px;cursor:pointer;font-size:10px;font-weight:600}
.wb-btn:hover{background:#243050}
.tbl-collapse{flex:1;overflow:auto}
.tbl-inner{padding:8px 14px 16px}

/* table */
.sched-wrap table{border-collapse:collapse;width:100%;background:#161b22;border-radius:5px;overflow:hidden;border:1px solid #21283a;box-shadow:0 2px 8px rgba(0,0,0,.35)}
.sched-wrap table th,.sched-wrap table td{border:1px solid #1e2a3a}
.ch-no{width:30px}.ch-mat{width:168px}.ch-io{width:40px}.ch-abc{width:36px}.ch-pv{width:56px}.ch-sta{width:76px}
.ch-am{width:98px}.ch-pm{width:98px}.ch-tr{width:42px}
.hdr-top td,.hdr-top th{background:#1c2942;color:#93c5fd;text-align:center;font-size:11px;font-weight:700;padding:7px 3px;border-color:#243660;letter-spacing:.2px}
.hdr-sub td,.hdr-sub th{background:#141e30;color:#5a88b0;text-align:center;font-size:10px;font-weight:500;padding:5px 3px;border-color:#1e2a3a}
.slot-lbl{font-weight:600;display:block;color:#6ea3cc}.slot-time{font-size:9px;display:block;margin-top:1px;opacity:.7}
.th-fixed{background:#1c2942;color:#93c5fd;text-align:center;font-weight:700;font-size:11px;padding:6px 3px;vertical-align:middle;border-color:#243660}
.grp-rm{background:#0d2649;color:#7fc3f5;font-size:11px;font-weight:700;padding:5px 9px;text-align:left;border-color:#153560}
.grp-ws{background:#0a2b1a;color:#6ee7b7;font-size:11px;font-weight:700;padding:5px 9px;text-align:left;border-color:#103d24}
.row-rm{background:#0e1623}.row-ws{background:#0d1a11}
.row-rm:hover td{background:#131f2e!important}.row-ws:hover td{background:#101d14!important}
.td-no{text-align:center;color:#3a5070;font-size:11px;padding:5px 3px;background:#0b0f16}
.td-mat{padding:5px 7px;font-weight:600;font-size:12px;color:#e6edf3}
.td-io{text-align:center;padding:3px}
.io-in{display:inline-block;background:#0d2849;color:#58a6ff;font-size:10px;font-weight:700;padding:2px 5px;border-radius:3px;border:1px solid #1d3f70}
.io-out{display:inline-block;background:#0a2e1c;color:#3fb950;font-size:10px;font-weight:700;padding:2px 5px;border-radius:3px;border:1px solid #14422a}
.td-abc{text-align:center;font-weight:700;font-size:13px;padding:3px}
.abc-a{color:#f47067}.abc-b{color:#e3b341}.abc-c{color:#3fb950}
.td-pv{text-align:center;font-weight:700;font-size:13px;color:#f0883e;padding:3px;font-family:monospace}
.td-sta{text-align:center;padding:3px}
.sta-pill{display:inline-flex;align-items:center;gap:2px;background:#1c3557;color:#7eb9f5;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;border:1px solid #2a4f7a;white-space:nowrap}
.sta-star{color:#e6b84a;font-size:10px}
.td-slot{text-align:center;padding:3px;vertical-align:middle;background:inherit}
.td-trip{text-align:center;padding:3px;vertical-align:middle;background:inherit}
.slot-am{display:inline-block;background:#2d2000;border:1.5px solid #e6b84a;border-radius:4px;padding:3px 6px;font-size:10px;font-weight:700;color:#e6b84a;font-family:monospace;cursor:pointer;white-space:nowrap;transition:background .12s;box-shadow:0 0 5px rgba(230,184,74,.12)}
.slot-am:hover{background:#3a2900}
.slot-pm{display:inline-block;background:#2d1200;border:1.5px solid #f0883e;border-radius:4px;padding:3px 6px;font-size:10px;font-weight:700;color:#f0883e;font-family:monospace;cursor:pointer;white-space:nowrap;transition:background .12s;box-shadow:0 0 5px rgba(240,136,62,.12)}
.slot-pm:hover{background:#3a1800}
.slot-empty{display:block;height:26px;border:1px dashed transparent;border-radius:3px;cursor:pointer;transition:border .12s}
.slot-empty:hover{border-color:#2a3a4a;background:#111820}
.trip-badge{display:inline-block;background:#b43d00;color:#fff;font-weight:700;font-size:12px;font-family:monospace;min-width:28px;text-align:center;padding:2px 6px;border-radius:4px;cursor:pointer;box-shadow:0 1px 4px rgba(180,61,0,.4)}
.trip-badge:hover{background:#d44a00}
.trip-zero{display:block;height:22px;cursor:pointer}

/* ═══ MODAL ═══ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-bg.on{display:flex}
.modal{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:22px 24px;width:340px;box-shadow:0 12px 40px rgba(0,0,0,.6)}
.m-title{font-size:14px;font-weight:700;margin-bottom:3px;color:#e6edf3}
.m-sub{font-size:11px;color:#6a8099;margin-bottom:14px;line-height:1.5}
.m-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.m-lbl{flex:1;font-size:12px;font-weight:500;color:#c9d1d9}
.m-inp{width:80px;background:#0d1117;border:1px solid #30363d;border-radius:5px;padding:6px 8px;font-family:monospace;font-size:14px;font-weight:700;text-align:right;color:#f0883e;outline:none;color-scheme:dark}
.m-inp:focus{border-color:#58a6ff}
.m-unit{font-size:11px;color:#484f58;min-width:40px}
.m-stock{background:#141e2e;border:1px solid #1d3050;border-radius:5px;padding:7px 10px;font-size:11px;color:#6a8099;margin-bottom:12px;line-height:1.6}
.m-btns{display:flex;gap:8px}
.mb-ok{flex:1;padding:9px;background:#1f6feb;color:#fff;font-weight:700;font-size:12px;border:none;border-radius:5px;cursor:pointer}
.mb-ok:hover{background:#388bfd}
.mb-auto,.mb-cancel{padding:9px 12px;background:#21262d;color:#8b949e;font-size:12px;border:1px solid #30363d;border-radius:5px;cursor:pointer}
.mb-auto:hover,.mb-cancel:hover{border-color:#484f58;color:#c9d1d9}

/* ═══ SETTINGS ═══ */
.set-body{flex:1;overflow-y:auto;padding:20px;background:#0d1117}
.set-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:900px}
.set-card{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.set-card-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#58a6ff;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #21262d}
.srow{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #161b22}
.srow:last-child{border:none}
.srow-lbl{flex:1;font-size:12px;font-weight:500;color:#c9d1d9}
.srow-sub{font-size:10px;color:#484f58;margin-top:1px}
.srow-inp{width:88px;background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:4px 7px;font-family:monospace;font-size:12px;font-weight:600;text-align:right;color:#f0883e;outline:none;color-scheme:dark}
.srow-inp:focus{border-color:#58a6ff}
.srow-unit{font-size:10px;color:#484f58;font-family:monospace;min-width:30px}
.set-actions{margin-top:16px;display:flex;gap:8px;grid-column:1/-1}
.btn-blue{padding:9px 20px;background:#1f6feb;color:#fff;font-weight:700;font-size:12px;border:none;border-radius:5px;cursor:pointer}
.btn-blue:hover{background:#388bfd}
.btn-outline{padding:9px 16px;background:#21262d;color:#8b949e;font-size:12px;border:1px solid #30363d;border-radius:5px;cursor:pointer}
.btn-outline:hover{color:#c9d1d9;border-color:#484f58}

/* ═══ OVERVIEW ═══ */
.ov-body{overflow-y:visible;padding:16px;background:#0d1117}
.ov-table{border-collapse:collapse;width:100%;background:#161b22;border:1px solid #30363d;border-radius:6px;overflow:hidden;font-size:11px;font-family:monospace;box-shadow:0 1px 6px rgba(0,0,0,.3)}
.ov-table th{background:#1c2942;color:#7db8e0;padding:7px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.4px;font-weight:700;text-align:center;border-bottom:1px solid #30363d}
.ov-table td{padding:5px 8px;text-align:center;border-bottom:1px solid #1a2030;color:#8b949e}
.ov-table tr:hover td{background:#1c2335;cursor:pointer;color:#c9d1d9}
.ov-ok{color:#3fb950;background:#0a2e1c}.ov-watch{color:#e3b341;background:#2a1e00}
.ov-crit{color:#f47067;background:#2a0d0d}.ov-upper{color:#f0883e;background:#2a1500}

/* ═══ MISC ═══ */
.toast{position:fixed;bottom:16px;right:16px;padding:9px 16px;background:#1f6feb;color:#fff;font-weight:700;font-size:12px;border-radius:5px;z-index:999;transform:translateY(40px);opacity:0;transition:all .2s;pointer-events:none}
.toast.on{transform:translateY(0);opacity:1}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:#0d1117}::-webkit-scrollbar-thumb{background:#21262d;border-radius:3px}::-webkit-scrollbar-thumb:hover{background:#30363d}

/* ═══ DAY-RATE SELECTOR ═══ */
.set-day-tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.sdt{padding:3px 8px;border-radius:4px;font-family:monospace;font-size:10px;font-weight:600;cursor:pointer;border:1px solid #21262d;background:#0d1117;color:#484f58;transition:all .12s;min-width:32px;text-align:center}
.sdt:hover{border-color:#30363d;color:#8b949e}
.sdt.on{background:#1f3a6e;border-color:#58a6ff;color:#93c5fd}
.sdt.has-ovr{border-color:#e6b84a;color:#e6b84a}
.sdt.has-ovr.on{background:#3a2900;border-color:#e6b84a;color:#e6b84a}
.set-day-note{font-size:10px;color:#484f58;margin-bottom:10px;padding:6px 9px;background:#0d1117;border-radius:4px;border:1px solid #21262d;line-height:1.5}
.rate-default-tag{font-size:9px;color:#3a5070;font-family:monospace;margin-left:6px}
.rate-ovr-tag{font-size:9px;color:#e6b84a;font-family:monospace;margin-left:6px}
.rate-reset-btn{font-size:9px;color:#484f58;cursor:pointer;border:none;background:transparent;padding:0 4px;transition:color .12s}
.rate-reset-btn:hover{color:#f47067}

/* ═══ SAVE/LOAD BAR ═══ */
.save-bar{background:#161b22;border-top:1px solid #30363d;padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.save-status{font-size:10px;color:#3a5070;flex:1}
.save-status .saved{color:#56d364}.save-status .unsaved{color:#e3b341}
.sb-btn{padding:5px 12px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid;transition:all .15s;white-space:nowrap}
.sb-save{background:#1f6feb;color:#fff;border-color:#1f6feb}.sb-save:hover{background:#388bfd}
.sb-load{background:#21262d;color:#8b949e;border-color:#30363d}.sb-load:hover{color:#c9d1d9;border-color:#484f58}
.sb-clear{background:#21262d;color:#6a3030;border-color:#3a1a1a}.sb-clear:hover{color:#f47067;border-color:#f47067}


/* save bar at bottom */
body{padding-bottom:40px}
.save-bar{position:fixed;bottom:0;left:0;right:0;background:#0d1117;border-top:1px solid #21262d;padding:6px 14px;display:flex;align-items:center;gap:8px;z-index:100}


/* ═══ RATE PRESETS ═══ */
.preset-card{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:14px;grid-column:1/-1}
.preset-card-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#58a6ff;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #21262d;display:flex;align-items:center;gap:10px}
.preset-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;max-height:220px;overflow-y:auto}
.preset-item{background:#0d1117;border:1px solid #21262d;border-radius:5px;padding:8px 10px;display:flex;align-items:center;gap:8px;transition:border .12s}
.preset-item:hover{border-color:#30363d}
.preset-item.active{border-color:#58a6ff;background:#0d1f3a}
.pi-name{flex:1;font-size:12px;font-weight:600;color:#c9d1d9;cursor:pointer}
.pi-name:hover{color:#58a6ff}
.pi-desc{font-size:10px;color:#3a5070;font-family:monospace}
.pi-rates{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.pi-rate-chip{font-size:9px;font-family:monospace;padding:1px 5px;border-radius:3px;background:#1a2438;color:#5a88b0}
.pi-rate-chip.changed{background:#2a2000;color:#e6b84a}
.pi-actions{display:flex;gap:4px;flex-shrink:0}
.pi-btn{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid;transition:all .12s;white-space:nowrap}
.pi-btn-apply{background:#0d2040;color:#58a6ff;border-color:#1d3a6a}.pi-btn-apply:hover{background:#1f3a6e}
.pi-btn-del{background:#1a0808;color:#6a2020;border-color:#2a1010}.pi-btn-del:hover{color:#f47067;border-color:#f47067}

/* Create new preset row */
.preset-create{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding-top:10px;border-top:1px solid #21262d;margin-top:4px}
.preset-name-inp{flex:1;min-width:140px;background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:5px 8px;color:#c9d1d9;font-size:12px;outline:none}
.preset-name-inp:focus{border-color:#58a6ff}
.preset-name-inp::placeholder{color:#484f58}
.pi-btn-create{padding:5px 14px;background:#1f6feb;color:#fff;border:none;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.pi-btn-create:hover{background:#388bfd}

/* Apply preset to days */
.apply-preset-panel{display:none;background:#0d1117;border:1px solid #21262d;border-radius:5px;padding:12px;margin-top:8px}
.apply-preset-panel.show{display:block}
.apl-title{font-size:11px;font-weight:600;color:#e6b84a;margin-bottom:8px}
.day-checkboxes{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.dc{display:flex;align-items:center;gap:3px;font-size:10px}
.dc input[type=checkbox]{accent-color:#58a6ff;cursor:pointer}
.dc label{cursor:pointer;font-family:monospace;color:#6a8099;min-width:22px}
.dc label:hover{color:#c9d1d9}
.dc.has-preset label{color:#e6b84a}
.apl-btns{display:flex;gap:6px;flex-wrap:wrap}
.apl-select-all{font-size:10px;color:#3a7bd5;cursor:pointer;text-decoration:underline;margin-right:4px}
.apl-clear-sel{font-size:10px;color:#484f58;cursor:pointer;text-decoration:underline}


/* ═══ HOME VIEW ═══ */
.home-body{flex:1;padding:20px 20px 60px;background:#0d1117;display:flex;flex-direction:column;gap:16px;min-height:min-content}
.home-hero{background:linear-gradient(135deg,#0d2040 0%,#161b22 100%);border:1px solid #1d3a6a;border-radius:10px;padding:24px 28px;display:flex;align-items:flex-start;gap:20px}
.hh-left{flex:1}
.hh-title{font-size:22px;font-weight:700;color:#e6edf3;margin-bottom:4px}
.hh-sub{font-size:12px;color:#4a607a;line-height:1.6;margin-bottom:14px}
.hh-stats{display:flex;gap:16px;flex-wrap:wrap}
.hh-stat{background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:8px 14px;min-width:90px}
.hh-stat .sv{font-size:20px;font-weight:700;font-family:monospace;color:#58a6ff}
.hh-stat .sl{font-size:9px;color:#3a5070;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.hh-right{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.hh-btn{padding:8px 18px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid;white-space:nowrap;transition:all .15s}
.hh-btn-blue{background:#1f6feb;color:#fff;border-color:#1f6feb}.hh-btn-blue:hover{background:#388bfd}
.hh-btn-out{background:#21262d;color:#8b949e;border-color:#30363d}.hh-btn-out:hover{color:#c9d1d9;border-color:#484f58}

/* Material summary cards */
.home-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#3a5070;display:flex;align-items:center;gap:8px}
.home-section-title::after{content:'';flex:1;height:1px;background:#21262d}
.mat-summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.msc{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:12px;border-left:3px solid #21262d;transition:border .15s}
.msc:hover{border-color:#30363d}
.msc.rm{border-left-color:#4f9eff}.msc.ws{border-left-color:#a371f7}
.msc-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.msc-name{font-size:12px;font-weight:600;color:#e6edf3}
.msc-type{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;font-family:monospace}
.msc-rm{background:#0d1f3a;color:#58a6ff}.msc-ws{background:#1a0d3a;color:#a371f7}
.msc-row{display:flex;justify-content:space-between;font-size:10px;padding:2px 0;border-bottom:1px solid #161b22}
.msc-row:last-child{border:none}
.msc-val{font-family:monospace;font-weight:600;color:#79c0ff}
.msc-pct{height:3px;background:#21262d;border-radius:2px;margin-top:6px;overflow:hidden}
.msc-pct-fill{height:100%;border-radius:2px}

/* ═══ PLANS SECTION ═══ */
.plans-section{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:18px 20px}
.plans-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.plans-hdr-title{font-size:14px;font-weight:700;color:#e6edf3}
.plans-hdr-sub{font-size:11px;color:#3a5070}
.plans-grid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.plan-card{background:#0d1117;border:2px solid #21262d;border-radius:8px;padding:14px;cursor:pointer;transition:all .2s;position:relative;min-height:140px;display:flex;flex-direction:column;width:220px;flex-shrink:0}
.plan-card:hover{border-color:#30363d;background:#0f1520}
.plan-card.active-plan{border-color:#58a6ff;background:#0d1f3a;box-shadow:0 0 16px rgba(88,166,255,.12)}
.plan-card.empty-plan{border-style:dashed;opacity:.6;width:180px}
.plan-card.empty-plan:hover{opacity:1}
.plan-add-btn{display:flex;align-items:center;justify-content:center;width:180px;min-height:140px;border:2px dashed #1e3a5a;border-radius:8px;background:#080d14;cursor:pointer;transition:all .2s;flex-direction:column;gap:6px;flex-shrink:0}
.plan-add-btn:hover{border-color:#3a7bd5;background:#0d1a2a}
.plan-add-icon{font-size:28px;color:#1e3a5a;transition:color .2s}
.plan-add-btn:hover .plan-add-icon{color:#58a6ff}
.plan-add-lbl{font-size:10px;color:#2a4060;font-weight:600;transition:color .2s}
.plan-add-btn:hover .plan-add-lbl{color:#79c0ff}
.pc-badge{position:absolute;top:8px;right:8px;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px}
.pc-active-badge{background:#0d2040;color:#58a6ff;border:1px solid #1d3a6a}
.pc-num{font-size:10px;font-weight:700;color:#3a5070;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.pc-name{font-size:14px;font-weight:700;color:#e6edf3;margin-bottom:6px;word-break:break-word}
.pc-meta{font-size:10px;color:#3a5070;line-height:1.5;flex:1}
.pc-date{font-size:9px;color:#2a4060;margin-top:6px;font-family:monospace}
.pc-actions{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap}
.pc-btn{padding:3px 9px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid;transition:all .12s;white-space:nowrap}
.pc-load{background:#0d1f3a;color:#58a6ff;border-color:#1d3a6a}.pc-load:hover{background:#1f3a6e}
.pc-save{background:#0a2e1c;color:#3fb950;border-color:#14422a}.pc-save:hover{background:#0f3d22}
.pc-del{background:#1a0808;color:#6a2020;border-color:#2a1010}.pc-del:hover{color:#f47067;border-color:#f47067}
.pc-rename{background:#21262d;color:#8b949e;border-color:#30363d}.pc-rename:hover{color:#c9d1d9}
.pc-empty-add{font-size:28px;color:#21262d;text-align:center;margin:auto;display:flex;align-items:center;justify-content:center;flex:1}
.pc-empty-lbl{font-size:11px;color:#3a5070;text-align:center;margin-top:4px}

/* Plan compare bar */
.plan-compare{background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:10px 14px;margin-top:4px;display:none}
.plan-compare.show{display:block}
.pc-compare-title{font-size:10px;font-weight:700;color:#3a5070;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.compare-grid{display:grid;font-size:10px;font-family:monospace;gap:2px;overflow-x:auto}
.cg-hdr{font-size:9px;color:#3a5070;padding:4px 8px;text-align:center;font-weight:700;white-space:nowrap}
.cg-cell{padding:4px 8px;text-align:center;border-radius:3px;white-space:nowrap}
.cg-label{color:#6a8099;text-align:left;font-family:sans-serif;font-size:10px}
.cg-best{background:#0a2e1c;color:#3fb950}
.cg-worst{background:#2a0d0d;color:#f47067}
.cg-cost{color:#e6b84a}
.cg-sect{color:#2a4a6a;font-size:8px;text-transform:uppercase;letter-spacing:.5px;font-family:sans-serif;padding:6px 8px 2px;font-weight:700}


/* ════ GRAPHS ════ */
#v-gr.on{flex-direction:column;overflow:hidden}
.grv-top{flex-shrink:0;background:#0b1117;border-bottom:1px solid #1e2a3a;padding:8px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.grv-lbl{font-size:13px;font-weight:700;color:#e6edf3;letter-spacing:.2px}
/* ── Display Config Panel ── */
.dp-section{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#2a4060;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.dp-section::after{content:'';flex:1;height:1px;background:#161b22}
.dp-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.dp-toggle{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:5px;border:1px solid #21262d;background:#161b22;cursor:pointer;transition:all .13s;user-select:none}
.dp-toggle:hover{border-color:#3a5070;background:#0e1520}
.dp-toggle.on{background:#0d2040;border-color:#2a4a7a}
.dp-toggle.on .dp-dot{opacity:1}
.dp-toggle .dp-dot{width:8px;height:8px;border-radius:2px;opacity:.35;transition:opacity .13s;flex-shrink:0}
.dp-toggle .dp-line{width:16px;height:3px;border-radius:2px;opacity:.35;transition:opacity .13s;flex-shrink:0}
.dp-toggle .dp-dash{width:16px;height:3px;border-radius:1px;opacity:.35;transition:opacity .13s;flex-shrink:0;background:repeating-linear-gradient(90deg,currentColor 0,currentColor 3px,transparent 3px,transparent 6px)}
.dp-toggle.on .dp-dot,.dp-toggle.on .dp-line,.dp-toggle.on .dp-dash{opacity:1}
.dp-toggle-lbl{font-size:10px;font-weight:600;color:#6a8099;white-space:nowrap;transition:color .13s}
.dp-toggle.on .dp-toggle-lbl{color:#c9d1d9}
.grv-sep{width:1px;height:20px;background:#21262d;flex-shrink:0}
.gvb{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #21262d;background:#161b22;color:#6a8099;transition:all .13s;user-select:none;white-space:nowrap}
.gvb:hover{border-color:#3a5070;color:#c9d1d9}
.gvb.on{background:#0d2040;border-color:#58a6ff;color:#93c5fd}
.grv-mode-bar{display:none}
.grv-matbar{flex-shrink:0;background:#0d1117;border-bottom:1px solid #161b22;padding:7px 16px;display:flex;align-items:center;gap:5px;overflow-x:auto;flex-wrap:nowrap}
.grv-matbar::-webkit-scrollbar{display:none}
.grv-mat-div{width:1px;height:18px;background:#21262d;margin:0 4px;flex-shrink:0}
.gvm{padding:5px 13px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #21262d;background:#161b22;color:#6a8099;transition:all .13s;white-space:nowrap;flex-shrink:0}
.gvm:hover{color:#c9d1d9;border-color:#3a5070}
.gvm.sel{background:color-mix(in srgb,var(--mc) 18%,#0d1117);border-color:var(--mc);color:var(--mc)}
.gvm-all.on{background:#1a2438;border-color:#58a6ff;color:#58a6ff}
.grv-area{flex:1;display:flex;overflow:hidden;position:relative;min-height:0}
.grv-arr{flex-shrink:0;width:36px;background:#0b1117;border:none;color:#2a4060;font-size:22px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;user-select:none}
.grv-arr:hover{background:#0e1f36;color:#58a6ff}
.grv-arr-l{border-right:1px solid #161b22}.grv-arr-r{border-left:1px solid #161b22}
.grv-track{flex:1;display:flex;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.grv-track::-webkit-scrollbar{display:none}
/* Slide: no padding — sections handle their own padding */
.grv-slide{min-width:100%;width:100%;flex-shrink:0;scroll-snap-align:start;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;gap:0;padding:0;background:#0d1117;box-sizing:border-box}
.grv-slide::-webkit-scrollbar{width:4px}.grv-slide::-webkit-scrollbar-thumb{background:#21262d;border-radius:2px}
.grv-footer{flex-shrink:0;background:#0b1117;border-top:1px solid #161b22;padding:8px 16px;display:flex;align-items:center;justify-content:center;gap:7px;position:relative}
.grv-dot{width:7px;height:7px;border-radius:50%;background:#21262d;cursor:pointer;transition:all .2s;flex-shrink:0}
.grv-dot.on{width:22px;border-radius:4px}
.grv-ctr{position:absolute;right:14px;font-family:monospace;font-size:10px;color:#3a5070}

/* ── Slide header ── */
.gs-head{display:flex;align-items:center;gap:12px;padding:14px 18px 12px;flex-shrink:0}
.gs-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.gs-name{font-size:18px;font-weight:800;color:#e6edf3;letter-spacing:-.3px}
.gs-meta{font-size:10px;color:#3a5070;margin-top:2px}
.gs-badges{display:flex;gap:5px;flex-wrap:wrap;margin-left:auto;align-items:center}
.gbg{font-size:9px;font-weight:700;padding:3px 9px;border-radius:12px;border:1px solid;white-space:nowrap}
.gbg-ok{background:#0a2e1c;color:#3fb950;border-color:#14422a}
.gbg-warn{background:#2a1e00;color:#e3b341;border-color:#3a2e00}
.gbg-crit{background:#2a0d0d;color:#f47067;border-color:#3a1010}
.gbg-info{background:#1a2438;color:#58a6ff;border-color:#2a3a52}

/* ── KPI strip ── */
.gs-kpi-strip{display:flex;gap:0;border-top:1px solid #161b22;border-bottom:1px solid #161b22;overflow-x:auto;flex-shrink:0}
.gs-kpi-strip::-webkit-scrollbar{display:none}
.gs-kpi{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 18px;border-right:1px solid #161b22;flex-shrink:0;min-width:80px;position:relative}
.gs-kpi::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:2px;border-radius:2px 2px 0 0}
.gs-kpi.ok::after{background:#3fb950}.gs-kpi.warn::after{background:#e3b341}
.gs-kpi.crit::after{background:#f47067}.gs-kpi.upper::after{background:#f0883e}.gs-kpi.info::after{background:#58a6ff}
.gs-kv{font-size:20px;font-weight:800;font-family:monospace;color:#e6edf3;line-height:1}
.gs-kl{font-size:9px;color:#3a6090;text-transform:uppercase;letter-spacing:.6px;margin-top:4px;white-space:nowrap}

/* ── Chart ── */
.gs-chart-wrap{padding:16px 18px 10px;flex-shrink:0}
.gs-chart-canvas{position:relative;width:100%;height:390px}

/* ── Collapsible sections ── */
.gs-sect{border-top:1px solid #161b22;flex-shrink:0}
.gs-sect-hdr{display:flex;align-items:center;gap:10px;padding:13px 18px;cursor:pointer;user-select:none;transition:background .15s;border-left:3px solid transparent}
.gs-sect-hdr:hover{background:#0e1f36;border-left-color:#2a4a7a}
.gs-sect-hdr:active{background:#0d2040}
.gs-sect-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#5a80a8;flex:1}
.gs-sect-badge{font-size:9px;padding:2px 8px;border-radius:10px;background:#1a2e48;color:#58a6ff;border:1px solid #2a3e5a;white-space:nowrap}
.gs-sect-badge.warn{background:#2a1e00;color:#e3b341;border-color:#3a2e00}
.gs-sect-badge.crit{background:#2a0d0d;color:#f47067;border-color:#3a1010}
.gs-sect-arrow{width:22px;height:22px;border-radius:50%;background:#161b22;border:1px solid #21262d;display:flex;align-items:center;justify-content:center;font-size:12px;color:#3a6090;transition:transform .2s,background .15s,color .15s;flex-shrink:0;font-style:normal}
.gs-sect-arrow.open{transform:rotate(90deg);background:#0d2040;border-color:#2a4a7a;color:#79c0ff}
.gs-sect-hdr:hover .gs-sect-arrow{background:#0d2040;border-color:#2a4a7a;color:#79c0ff}
.gs-sect-body{padding:12px 18px 16px;display:none}
.gs-sect-body.open{display:block;animation:sectOpen .18s ease-out}
@keyframes sectOpen{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* ── Adjust inputs inside collapsible ── */
.gs-adj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-bottom:12px}
.gs-adj-row{display:flex;align-items:center;gap:8px;background:#0e1520;border:1px solid #1e2a3a;border-radius:7px;padding:10px 12px}
.gs-adj-lbl{flex:1;font-size:11px;color:#c9d1d9;font-weight:600}
.gs-adj-sub{font-size:9px;color:#3a5070;display:block;margin-top:2px;font-weight:400}
.gs-adj-inp{width:88px;background:#0d1117;border:1px solid #30363d;border-radius:5px;padding:5px 8px;font-family:monospace;font-size:13px;font-weight:700;text-align:right;color:#f0883e;outline:none;color-scheme:dark}
.gs-adj-inp:focus{border-color:#58a6ff}
.gs-adj-inp.changed{border-color:#e6b84a!important;color:#e6b84a!important}
.gs-adj-unit{font-size:9px;color:#3a5070;font-family:monospace;min-width:30px}
.gs-adj-btns{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:4px}
.gs-abtn{padding:7px 18px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.gs-abtn-apply{background:#1f6feb;color:#fff}.gs-abtn-apply:hover{background:#388bfd}
.gs-abtn-opt{background:#0a2e1c;color:#3fb950;border:1px solid #14422a}.gs-abtn-opt:hover{background:#0f3d22}
.gs-abtn-reset{background:#21262d;color:#8b949e;border:1px solid #30363d}.gs-abtn-reset:hover{color:#c9d1d9}
.grv-adj-status{font-size:10px;color:#3a5070;margin-left:auto;font-family:monospace}
.grv-adj-status.ok{color:#3fb950}.grv-adj-status.warn{color:#e3b341}.grv-adj-status.crit{color:#f47067}

/* ── Day table inside collapsible ── */
.gs-tbl{width:100%;border-collapse:collapse;font-size:11px}
.gs-tbl th{padding:6px 8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#3a5070;border-bottom:1px solid #21262d;text-align:left}
.gs-tbl th.r{text-align:right}
.gs-tbl td{padding:6px 8px;border-bottom:1px solid #0e1520;vertical-align:middle;color:#8b949e}
.gs-tbl tr:hover td{background:#0e1520}
.gs-tbl td.r{text-align:right;font-family:monospace}.gs-tbl td.fw{font-weight:700;font-family:monospace}
.st-ok{color:#3fb950}.st-warn{color:#e3b341}.st-crit{color:#f47067}.st-upper{color:#f0883e}
.gs-mbar{height:4px;background:#1a2438;border-radius:2px;overflow:hidden;width:60px;display:inline-block;vertical-align:middle}
.gs-mfill{height:100%;border-radius:2px}
/* alias old selectors used in JS */
.grv-shdr{display:none}.grv-sdot,.grv-stitle,.grv-ssub,.grv-sbadges{display:none}
.grv-cwrap{display:none}.grv-stats{display:none}
.grv-tbl{width:100%;border-collapse:collapse;font-size:11px}
.grv-tbl th{padding:6px 8px;font-size:9px;font-weight:700;text-transform:uppercase;color:#3a5070;border-bottom:1px solid #21262d;text-align:left}
.grv-tbl th.r{text-align:right}.grv-tbl td{padding:6px 8px;border-bottom:1px solid #0e1520;vertical-align:middle;color:#8b949e}
.grv-tbl tr:hover td{background:#0e1520}.grv-tbl td.r{text-align:right;font-family:monospace}.grv-tbl td.fw{font-weight:700;font-family:monospace}
.grv-mbar{height:4px;background:#1a2438;border-radius:2px;overflow:hidden;width:60px;display:inline-block;vertical-align:middle}
.grv-mfill{height:100%;border-radius:2px}
.grv-adj{display:none}.grv-adj-grid,.grv-adj-row,.grv-adj-inp,.grv-adj-unit,.grv-adj-btns,.grv-abtn{display:none}

/* ════ HOURLY RATE OVERRIDES ════ */
.hr-adj{background:#0a1520;border:1px solid #1a2e48;border-radius:6px;padding:10px 12px;margin-top:8px}
.hr-adj-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#3a7bd5;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.hr-adj-title::after{content:'';flex:1;height:1px;background:#1a2e48}
.hr-adj-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.hr-sel{background:#0d1117;border:1px solid #21262d;border-radius:4px;padding:4px 6px;font-family:monospace;font-size:11px;color:#93c5fd;outline:none;color-scheme:dark;cursor:pointer}
.hr-sel:focus{border-color:#58a6ff}
.hr-inp{width:90px;background:#0d1117;border:1px solid #21262d;border-radius:4px;padding:4px 7px;font-family:monospace;font-size:12px;font-weight:700;text-align:right;color:#f0883e;outline:none;color-scheme:dark}
.hr-inp:focus{border-color:#58a6ff}
.hr-unit{font-size:9px;color:#3a5070;font-family:monospace}
.hr-btn{padding:4px 10px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid;transition:all .12s;white-space:nowrap}
.hr-btn-set{background:#0d2040;color:#58a6ff;border-color:#1d3a6a}.hr-btn-set:hover{background:#1f3a6e}
.hr-btn-clr{background:#1a0808;color:#6a2020;border-color:#2a1010}.hr-btn-clr:hover{color:#f47067;border-color:#f47067}

<script>
'use strict';

// ══════════════════════════════════════════════════
// MASTER DATA
// ══════════════════════════════════════════════════
const MATS = [
  {id:1, n:'Bleaching Earth',  s:'BE',  ln:'Bleaching Earth',           io:'IN',  t:'RM', a:'A', cap:88,      rate:7.598,   pv:14,  lm:120, pk:'AM',   dk:'DOCK-1',   sta:'STA-S1', mp:null},
  {id:2, n:'Filter Aid',       s:'FA',  ln:'Filter Aid',                io:'IN',  t:'RM', a:'B', cap:23,      rate:3.037,   pv:5.4, lm:5,   pk:'AM',   dk:'DOCK-FA',  sta:'STA-S2', mp:null},
  {id:3, n:'Citric Acid',      s:'CA',  ln:'Citric Acid',               io:'IN',  t:'RM', a:'B', cap:25,      rate:1.29,    pv:3,   lm:20,  pk:'AM',   dk:'DOCK-3',   sta:'STA-S3', mp:1},
  {id:4, n:'Caustic Soda',     s:'CS',  ln:'Caustic Soda',              io:'IN',  t:'RM', a:'C', cap:12.2,    rate:0.45,    pv:10,  lm:120, pk:'NOON', dk:'DOCK-3',   sta:'STA-S3', mp:null},
  {id:5, n:'SBE',              s:'SBE', ln:'SBE (Spent Bleaching Earth)',io:'OUT', t:'WS', a:'A', cap:111,     rate:18.5,    pv:10,  lm:10,  pk:'NOON', dk:'DOCK-SBE', sta:'STA-S1', mp:null},
  {id:6, n:'Acid Gum',         s:'AG',  ln:'Acid Gum',                  io:'OUT', t:'WS', a:'A', cap:180,     rate:17.712,  pv:27,  lm:40,  pk:'AM',   dk:'DOCK-4',   sta:'STA-S4', mp:null},
  {id:7, n:'Wastewater',       s:'WW',  ln:'Wastewater',                io:'OUT', t:'WS', a:'A', cap:362,     rate:163.334, pv:27,  lm:40,  pk:'BOTH', dk:'DOCK-WW',  sta:'STA-S2', mp:null, wwMax:7},
  {id:8, n:'Cont. Water',      s:'CW',  ln:'Contaminated Water',        io:'OUT', t:'WS', a:'B', cap:569.305, rate:6.832,   pv:27,  lm:40,  pk:'NOON', dk:'DOCK-5',   sta:'STA-S5', mp:null},
];
const M={};MATS.forEach(m=>M[m.id]=m);
// Store default pv values so we can reset
const MATS_DEFAULT_PV={};MATS.forEach(m=>MATS_DEFAULT_PV[m.id]=m.pv);
const DX={'DOCK-1':3,'DOCK-FA':72,'DOCK-3':5,'DOCK-4':9,'DOCK-WW':21,'DOCK-5':12,'DOCK-SBE':48};
const WH={'WH-FA-CA':40};
const RM_MATS=[1,2,3,4], WS_MATS=[5,6,7,8];
const WIN_AM=360, WIN_NO=480, T_AM=7*60, T_NO=13*60, T_END=21*60;
const DAYS=31;
const MAT_COLORS={1:'#4f9eff',2:'#79c0ff',3:'#56d364',4:'#4ade80',5:'#a371f7',6:'#d2a8ff',7:'#f47067',8:'#f0883e'};

let RATES={};MATS.forEach(m=>RATES[m.id]=m.rate);
let INIT={
  1:+(88*0.3575).toFixed(3),
  2:+Math.min(23,23*0.308+11.25).toFixed(3),
  3:+Math.min(25,25*0.16+10).toFixed(3),
  4:+(12.2*0.5).toFixed(3),
  5:0, 6:+(180*0.201).toFixed(3), 7:0,
  8:+(569.305*0.66).toFixed(3)
};
let OVR={}, RES=[], WK=0, SEL=1;
// Per-day rate overrides: {day: {matId: rate}}
let DAY_RATES={};
// Named rate presets: [{id, name, rates:{matId:val}, appliedDays:[]}]
let PRESETS=[];
// Plans: up to 4 named snapshots of the full state
let PLANS=[]; // unlimited saved plans
let ACTIVE_PLAN=-1;
let PRESET_EDIT_ID=null; // which preset is being applied to days
// Settings UI state
let SET_DAY=0; // 0 = global defaults, 1-31 = specific day
let mDay=0, mId=0, tblOpen=true;
let GRV_MODE='month'; // 'month' = 31-day mixed chart, 'day' = hourly single-day

// Per-hour rate overrides: HOUR_RATES[day][matId][hour] = T/hr
// day: 1-31, matId: 1-8, hour: 0-23
let HOUR_RATES={};

// ═══════════════════════════════════════════════════
// PROCESS / FEED SETUP
// ═══════════════════════════════════════════════════
const FEED_PRESETS={
  min:   {label:'Minimum',  feedPerTrain:16.5, color:'#e3b341'},
  normal:{label:'Normal',   feedPerTrain:25,   color:'#3fb950'},
  max:   {label:'Maximum',  feedPerTrain:33,   color:'#f0883e'},
};
const PIPE_LOSS=3; // m³/h loss in pipe per train
const TRAIN_COUNT=2;

let PROC={
  mode:'normal',           // 'min'|'normal'|'max'|'custom'
  customFeed:25,           // m³/h per train (custom mode)
  precoatRounds:18,        // rounds/day (14-18)
  citricSP:0.8,            // citric setpoint kg/m³
  causticSP:0.4,           // caustic setpoint kg/m³
  trains:2,                // number of trains
};

function procFeedPerTrain(){
  if(PROC.mode==='custom')return PROC.customFeed;
  return FEED_PRESETS[PROC.mode].feedPerTrain;
}
function procFlowPerTrain(){return Math.max(0,procFeedPerTrain()-PIPE_LOSS);}
function procTotalFlow(){return procFlowPerTrain()*PROC.trains;}

function calcProcessRates(){
  const fpt=procFeedPerTrain();
  const flow=procFlowPerTrain(); // m³/h per train
  const flowTotal=procTotalFlow(); // m³/h both trains
  const rds=PROC.precoatRounds; // rounds/day
  const roundsPerHr=rds/24;   // rounds/h

  // 1. Bleaching Earth (T/h) = flow × 0.53% × trains / 1000 (kg→T)
  const be_hr=(flow*0.0053*PROC.trains); // T/h  (0.53% = kg/m3, density≈1000kg/m3 so ×1 T/m3... actually: m3/h × 0.53% = fraction → ×1000 for kg, ÷1000 for T = ×1)
  // Actually: 22 m³/h × 0.53% = 22×0.0053 = 0.1166 m³/h equivalent = 116.6 kg/h → /1000 = 0.1166 T/h
  // The example says 116.6 kg/h = 0.1166 T/h per train, ×2 = 0.2332 T/h
  const be_day=be_hr*24;

  // 2. Filter Aid (T/h)
  const fa_inj1=flow*0.001*PROC.trains; // m³/h × 0.1% × 2 → T/h (density ~1000)
  const fa_inj2=(93.75*roundsPerHr)/1000; // kg/round × rounds/hr ÷ 1000 = T/h
  const fa_hr=fa_inj1+fa_inj2;
  const fa_day=fa_hr*24;

  // 3. Citric Acid (T/h)
  const ca_inj1=(flow*PROC.citricSP*PROC.trains)/1000; // flow m³/h × SP kg/m³ × 2 ÷ 1000 = T/h
  const ca_inj2=flow*0.00007*PROC.trains; // flow × 0.007% × 2
  const ca_inj3=flow*0.0003*PROC.trains;  // flow × 0.03% × 2
  const ca_hr=ca_inj1+ca_inj2+ca_inj3;
  const ca_day=ca_hr*24;

  // 4. Caustic Soda (T/h)
  const cs_inj1=(flow*PROC.causticSP*PROC.trains)/1000; // flow × SP kg/m³ × trains ÷ 1000
  const cs_hr=cs_inj1;
  const cs_day=cs_hr*24;

  // 5. SBE (T/h) = 1000 kg/round × rounds/hr ÷ 1000
  const sbe_hr=roundsPerHr; // T/h
  const sbe_day=sbe_hr*24;

  // 6. Acid Gum (m³/h) — % of tank vol/h, interpolate at current flow
  const agCap=M[6]?M[6].cap:180;
  const agRates={min:0.125,normal:0.139,max:0.133};
  // Interpolate between modes based on actual flow vs min/normal/max flows
  const flowMin=procFlowByMode('min'), flowNorm=procFlowByMode('normal'), flowMax=procFlowByMode('max');
  const agPct=interpFlow(flow,flowMin,flowNorm,flowMax,agRates.min,agRates.normal,agRates.max);
  const ag_hr=agPct*agCap; // m³/h
  const ag_day=ag_hr*24;

  // 7. Wastewater — pond (103m³) + tank (362m³)
  const wwPondCap=103, wwTankCap=362;
  const wwPondRates={min:0.3566,normal:0.4114,max:0.4629};
  const wwTankRates={min:0.0107,normal:0.0169,max:0.018};
  const wwPondPct=interpFlow(flow,flowMin,flowNorm,flowMax,wwPondRates.min,wwPondRates.normal,wwPondRates.max);
  const wwTankPct=interpFlow(flow,flowMin,flowNorm,flowMax,wwTankRates.min,wwTankRates.normal,wwTankRates.max);
  const ww_pond_hr=wwPondPct*wwPondCap;  // m³/h into pond
  const ww_tank_hr=wwTankPct*wwTankCap;  // m³/h into tank
  const ww_hr=ww_pond_hr+ww_tank_hr;     // combined
  const ww_day=ww_hr*24;

  // 8. Contaminated Water (m³/h) = 0.6% of max cap/h
  const cwCap=M[8]?M[8].cap:569.305;
  const cw_hr=cwCap*0.006;
  const cw_day=cw_hr*24;

  return {
    feedPerTrain:fpt, flowPerTrain:flow, flowTotal,
    be:{hr:be_hr,day:be_day},
    fa:{hr:fa_hr,day:fa_day,inj1:fa_inj1,inj2:fa_inj2},
    ca:{hr:ca_hr,day:ca_day,inj1:ca_inj1,inj2:ca_inj2,inj3:ca_inj3},
    cs:{hr:cs_hr,day:cs_day,inj1:cs_inj1},
    sbe:{hr:sbe_hr,day:sbe_day},
    ag:{hr:ag_hr,day:ag_day,pct:agPct},
    ww:{hr:ww_hr,day:ww_day,pondHr:ww_pond_hr,tankHr:ww_tank_hr},
    cw:{hr:cw_hr,day:cw_day},
  };
}

// ── Feed Schedule ──
// Each entry: {day:1-31, hour:0-23, mode:'min'|'normal'|'max'|'custom', customFeed:number}
// Sorted by (day, hour). The active entry at any point is the latest one before that time.
let FEED_SCHEDULE=[];

function fsKey(d,h){return d*100+h;}

function getActiveFeed(d,h){
  // Find the latest schedule entry at or before (d, h)
  var key=fsKey(d,h);
  var best=null;
  for(var i=0;i<FEED_SCHEDULE.length;i++){
    var e=FEED_SCHEDULE[i];
    var ek=fsKey(e.day,e.hour);
    if(ek<=key&&(!best||ek>fsKey(best.day,best.hour)))best=e;
  }
  return best||{mode:PROC.mode,customFeed:PROC.customFeed};
}

function calcRatesForFeedEntry(entry){
  // Returns T/hr or m³/hr for each material id
  var savedMode=PROC.mode, savedCustom=PROC.customFeed;
  PROC.mode=entry.mode;
  PROC.customFeed=entry.customFeed||procFeedPerTrain();
  var r=calcProcessRates();
  PROC.mode=savedMode;PROC.customFeed=savedCustom;
  var rates={};
  rates[1]=r.be.hr;rates[2]=r.fa.hr;rates[3]=r.ca.hr;rates[4]=r.cs.hr;
  rates[5]=r.sbe.hr;rates[6]=r.ag.hr;rates[7]=r.ww.hr;rates[8]=r.cw.hr;
  return rates;
}

function fsAdd(fDay,fHr,tDay,tHr,mode,customFeed){
  // Remove existing entries in this range
  FEED_SCHEDULE=FEED_SCHEDULE.filter(function(e){
    var k=fsKey(e.day,e.hour);
    return k<fsKey(fDay,fHr)||k>fsKey(tDay,tHr);
  });
  // Add one entry per day boundary + start point
  // For simplicity: add entry at (fDay,fHr) and clear any auto-entries between
  // Add entries at start and at each day's 00:00 within the range
  for(var d=fDay;d<=tDay;d++){
    var h0=(d===fDay)?fHr:0;
    var h1=(d===tDay)?tHr:23;
    // Only add at the start of each segment
    var startH=(d===fDay)?fHr:0;
    FEED_SCHEDULE.push({day:d,hour:startH,mode:mode,customFeed:customFeed||procFeedPerTrain(),
      label:FEED_PRESETS[mode]?FEED_PRESETS[mode].label:'Custom'});
  }
  // Sort
  FEED_SCHEDULE.sort(function(a,b){return fsKey(a.day,a.hour)-fsKey(b.day,b.hour);});
  runSim();buildProcess();markUnsaved();
  toast('Feed schedule set: '+fDay+' '+padH(fHr)+':00 → '+tDay+' '+padH(tHr)+':00 ✓');
}

function fsRemove(idx){
  FEED_SCHEDULE.splice(idx,1);
  runSim();buildProcess();markUnsaved();
  toast('Feed entry removed');
}

function fsClear(){
  if(!confirm('Clear all feed schedule entries? Will revert to global feed mode.'))return;
  FEED_SCHEDULE=[];
  runSim();buildProcess();markUnsaved();
  toast('Feed schedule cleared');
}

// Feed-schedule-aware rate lookup (used in runSim)
function getFeedRateAtHour(d,h,matId){
  if(FEED_SCHEDULE.length===0)return null; // no schedule → use normal RATES
  var entry=getActiveFeed(d,h);
  var rates=calcRatesForFeedEntry(entry);
  return rates[matId]!==undefined?rates[matId]:null;
}

function interpFlow(flow,fMin,fNorm,fMax,vMin,vNorm,vMax){
  if(flow<=fMin)return vMin;
  if(flow>=fMax)return vMax;
  if(flow<=fNorm){var t=(flow-fMin)/(fNorm-fMin);return vMin+t*(vNorm-vMin);}
  var t=(flow-fNorm)/(fMax-fNorm);return vNorm+t*(vMax-vNorm);
}

function procFlowByMode(mode){
  return (FEED_PRESETS[mode]?FEED_PRESETS[mode].feedPerTrain:25)-PIPE_LOSS;
}

function procApplyToSim(){
  var r=calcProcessRates();
  // Update global RATES (stored as T/day or m³/day)
  RATES[1]=+(r.be.day).toFixed(4);
  RATES[2]=+(r.fa.day).toFixed(4);
  RATES[3]=+(r.ca.day).toFixed(4);
  RATES[4]=+(r.cs.day).toFixed(4);
  RATES[5]=+(r.sbe.day).toFixed(4);
  RATES[6]=+(r.ag.day).toFixed(4);
  RATES[7]=+(r.ww.day).toFixed(4);
  RATES[8]=+(r.cw.day).toFixed(4);
  OVR={};runSim();buildSet();buildProcess();markUnsaved();
  toast('Process rates applied to simulation ✓');
}

function buildProcess(){
  var el=document.getElementById('proc-panel');
  if(!el)return;
  if(!M||!M[1]||!RES||!RES.length){el.innerHTML='<div style="padding:40px;text-align:center;color:#3a5070">Run simulation first…</div>';return;}
  var r=calcProcessRates();
  var mode=PROC.mode;
  var modeColor=mode==='custom'?'#79c0ff':(FEED_PRESETS[mode]?FEED_PRESETS[mode].color:'#3fb950');

  var H='<div class="proc-wrap">';

  // ── Header ──
  H+='<div class="proc-hdr">'
    +'<div><div class="proc-title">⚙ Process Feed Setup</div>'
    +'<div class="proc-sub">2 trains · Pipe loss '+PIPE_LOSS+' m³/h/train · Real-time rate calculation → simulation</div></div>'
    +'<button onclick="procApplyToSim()" class="proc-apply-btn">▶ Apply to Simulation</button>'
    +'</div>';

  // ── Feed Mode selector ──
  H+='<div class="proc-modes">';
  ['min','normal','max'].forEach(function(m){
    var pr=FEED_PRESETS[m];
    var flow=pr.feedPerTrain-PIPE_LOSS;
    var on=mode===m;
    H+='<div class="proc-mode-card'+(on?' on':'')+'" onclick="PROC.mode=\''+m+'\';buildProcess()" style="'+(on?'border-color:'+pr.color+';background:'+pr.color+'18':'')+'">'
      +'<div class="proc-mode-label" style="color:'+(on?pr.color:'#3a5070')+'">'+pr.label.toUpperCase()+'</div>'
      +'<div class="proc-mode-feed">'+pr.feedPerTrain+' <span>m³/h</span></div>'
      +'<div class="proc-mode-meta">×'+TRAIN_COUNT+' trains = '+(pr.feedPerTrain*TRAIN_COUNT)+' m³/h</div>'
      +'<div class="proc-mode-flow">Flow: '+flow+' m³/h/train</div>'
      +'</div>';
  });
  // Custom mode
  var onC=mode==='custom';
  H+='<div class="proc-mode-card'+(onC?' on':'')+'" onclick="PROC.mode=\'custom\';buildProcess()" style="'+(onC?'border-color:#79c0ff;background:#79c0ff18':'')+'">'
    +'<div class="proc-mode-label" style="color:'+(onC?'#79c0ff':'#3a5070')+'">CUSTOM</div>'
    +'<input class="proc-inp" type="number" min="0" max="40" step="0.1" value="'+PROC.customFeed+'" '
    +'oninput="PROC.customFeed=parseFloat(this.value)||0;PROC.mode=\'custom\';buildProcess()" onclick="event.stopPropagation()" style="width:70px;font-size:16px;margin:4px 0">'
    +'<div class="proc-mode-meta">m³/h per train</div>'
    +'<div class="proc-mode-flow">Flow: '+(Math.max(0,PROC.customFeed-PIPE_LOSS).toFixed(1))+' m³/h/train</div>'
    +'</div>';
  H+='</div>';

  // ── Active summary ──
  H+='<div class="proc-summary">'
    +'<div class="proc-sum-item"><span class="proc-sum-lbl">Feed/train</span><span class="proc-sum-val" style="color:'+modeColor+'">'+r.feedPerTrain+' m³/h</span></div>'
    +'<div class="proc-sum-item"><span class="proc-sum-lbl">Flow/train</span><span class="proc-sum-val" style="color:'+modeColor+'">'+r.flowPerTrain.toFixed(1)+' m³/h</span></div>'
    +'<div class="proc-sum-item"><span class="proc-sum-lbl">Total Flow</span><span class="proc-sum-val" style="color:'+modeColor+'">'+r.flowTotal.toFixed(1)+' m³/h</span></div>'
    +'<div class="proc-sum-item"><span class="proc-sum-lbl">Pre-coating</span>'
    +'<div style="display:flex;align-items:center;gap:6px">'
    +'<input class="proc-inp" type="number" min="14" max="18" step="1" value="'+PROC.precoatRounds+'" oninput="PROC.precoatRounds=parseInt(this.value)||18;buildProcess()" style="width:44px">'
    +'<span class="proc-sum-val">rounds/day</span></div></div>'
    +'<div class="proc-sum-item"><span class="proc-sum-lbl">Citric SP</span>'
    +'<div style="display:flex;align-items:center;gap:6px">'
    +'<input class="proc-inp" type="number" min="0" max="5" step="0.01" value="'+PROC.citricSP+'" oninput="PROC.citricSP=parseFloat(this.value)||0;buildProcess()" style="width:52px">'
    +'<span class="proc-sum-val">kg/m³</span></div></div>'
    +'<div class="proc-sum-item"><span class="proc-sum-lbl">Caustic SP</span>'
    +'<div style="display:flex;align-items:center;gap:6px">'
    +'<input class="proc-inp" type="number" min="0" max="5" step="0.01" value="'+PROC.causticSP+'" oninput="PROC.causticSP=parseFloat(this.value)||0;buildProcess()" style="width:52px">'
    +'<span class="proc-sum-val">kg/m³</span></div></div>'
    +'</div>';

  // ── Rate table ──
  function rateRow(id,name,col,hrVal,dayVal,unit,breakdown){
    var curSim=(RATES[id]/24).toFixed(4);
    var diff=Math.abs(hrVal-(RATES[id]/24));
    var synced=diff<0.0001;
    return '<tr>'
      +'<td><div style="display:flex;align-items:center;gap:7px"><div style="width:8px;height:8px;border-radius:50%;background:'+col+';flex-shrink:0"></div>'+name+'</div></td>'
      +'<td class="r proc-val" style="color:'+modeColor+'">'+hrVal.toFixed(4)+' '+unit+'/hr</td>'
      +'<td class="r proc-val">'+dayVal.toFixed(2)+' '+unit+'/day</td>'
      +'<td class="r" style="font-size:9px;color:#3a5070;font-family:monospace">'+breakdown+'</td>'
      +'<td class="r" style="font-family:monospace;font-size:9px;color:'+(synced?'#3fb950':'#e3b341')+'">'
      +(synced?'✓ synced':curSim+' '+unit+'/hr ≠')+'</td>'
      +'</tr>';
  }

  H+='<div class="proc-sect-title">Calculated Consumption Rates</div>';
  H+='<table class="proc-tbl"><thead><tr>'
    +'<th>Material</th><th class="r">Rate/hr</th><th class="r">Rate/day</th><th class="r">Breakdown</th><th class="r">Sim Status</th>'
    +'</tr></thead><tbody>';

  H+=rateRow(1,'Bleaching Earth','#4f9eff',r.be.hr,r.be.day,'T',

// ── LOGISTICS COSTS ──────────────────────────────
// RM: cost per T (Baht/T)
const COST_RM={1:32, 2:45, 3:40, 4:9.30};
// WS: cost per truck (Baht/truck) — fixed per trip
const COST_WS_FIXED={5:48000, 6:92000};
// WW & CW: (rate_per_m3 × vol_per_trip) + fixed — 3 options each
const COST_WW_OPTS=[
  {label:'Option 1 (1,100 Baht/m³)', fn:function(trucks,pv){return trucks*((1100*pv)+12000);}},
  {label:'Option 2 (1,200 Baht/m³)', fn:function(trucks,pv){return trucks*((1200*pv)+12000);}},
  {label:'Option 3 (1,600 Baht/m³)', fn:function(trucks,pv){return trucks*((1600*pv)+12000);}}
];
const COST_CW_OPTS=[
  {label:'Option 1 (1,100 Baht/m³)', fn:function(trucks,pv){return trucks*((1100*pv)+12000);}},
  {label:'Option 2 (1,200 Baht/m³)', fn:function(trucks,pv){return trucks*((1200*pv)+12000);}},
  {label:'Option 3 (1,600 Baht/m³)', fn:function(trucks,pv){return trucks*((1600*pv)+12000);}}
];
let COST_WW_SEL=0; // selected option index for WW (mat 7)
let COST_CW_SEL=0; // selected option index for CW (mat 8)

// ══════════════════════════════════════════════════
// SIMULATION
// ══════════════════════════════════════════════════
function whSp(k,stk){return Math.max(0,WH[k]-MATS.filter(m=>m.wh===k).reduce((a,m)=>a+stk[m.id],0));}

function autoRM(m,stk){
  const s=stk[m.id],hi=m.cap*.75;
  if(s>=hi||s>=m.cap*.60)return 0;
  let g=hi-s;if(m.wh)g=Math.min(g,whSp(m.wh,stk));
  if(g<.5)return 0;
  let n=Math.min(DX[m.dk],Math.max(1,Math.ceil(g/m.pv)));
  if(m.mp)n=Math.min(n,m.mp);return n;
}
function autoWS(m,stk){
  const s=stk[m.id];if(s<=0)return 0;
  if(m.id===7)return Math.max(1,Math.min(m.wwMax||7,Math.ceil(s/m.pv)));
  return Math.min(DX[m.dk],Math.ceil(s/m.pv));
}
function fmt(min){const h=Math.floor(min/60),m=min%60;return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;}
function slotStr(s,t,lm){if(!t)return null;return `${fmt(s)}–${fmt(s+t*lm)}`;}

// Returns rate/hr string for display
function rateHr(mid,d){
  const r=(d&&DAY_RATES[d]&&DAY_RATES[d][mid]!=null)?DAY_RATES[d][mid]:RATES[mid];
  return (r/24).toFixed(4);
}

function runSim(){
  const stk={};MATS.forEach(m=>stk[m.id]=parseFloat(INIT[m.id])||0);
  RES=[];
  for(let d=1;d<=DAYS;d++){
    // ── Snapshot opening stock for dispatch decisions ──
    const stkO={};MATS.forEach(m=>stkO[m.id]=stk[m.id]);

    const dkAM={},dkNO={},dkSL={};
    Object.keys(DX).forEach(k=>{dkAM[k]=0;dkNO[k]=0;dkSL[k]=0;});
    const dpA={},dpN={};MATS.forEach(m=>{dpA[m.id]=0;dpN[m.id]=0;});

    function tryD(id,per,want){
      const m=M[id],k=m.dk,win=per==='AM'?WIN_AM:WIN_NO;
      const tU=per==='AM'?dkAM[k]:dkNO[k];
      const maxT=Math.floor((win-tU)/m.lm),maxS=DX[k]-dkSL[k];
      const got=Math.min(want,maxT,maxS);if(!got)return 0;
      if(per==='AM'){dkAM[k]+=got*m.lm;dpA[id]+=got;}
      else{dkNO[k]+=got*m.lm;dpN[id]+=got;}
      dkSL[k]+=got;return got;
    }

    // ── Dispatch decisions (use stkO — opening stock) ──
    const ov=OVR[d];
    if(ov){
      MATS.forEach(m=>{
        let t=ov[m.id]||0;if(!t)return;
        if(m.mp)t=Math.min(t,m.mp);
        if(m.pk==='BOTH'){const ga=tryD(m.id,'AM',Math.min(t,DX[m.dk]));tryD(m.id,'NOON',Math.min(t-ga,DX[m.dk]));}
        else tryD(m.id,m.pk,t);
        // NO immediate stock update — handled hourly below
      });
    }else{
      // All dispatch decisions use opening-stock snapshot
      const ww=autoWS(M[7],stkO);
      if(ww){const ga=tryD(7,'AM',Math.min(ww,DX['DOCK-WW']));tryD(7,'NOON',Math.min(ww-ga,DX['DOCK-WW']));}
      [[5,'NOON'],[8,'NOON'],[6,'AM']].forEach(([id,pk])=>{const g=autoWS(M[id],stkO);if(!g)return;tryD(id,pk,g);});
      [[1,'AM'],[2,'AM']].forEach(([id,pk])=>{const g=autoRM(M[id],stkO);if(!g)return;tryD(id,pk,g);});
      const ca=autoRM(M[3],stkO);if(ca)tryD(3,'AM',Math.min(ca,1));
      const cs=autoRM(M[4],stkO);if(cs)tryD(4,'NOON',cs);
    }

    // ── Hourly simulation: rate/24 each hour, trucks applied at completion hour ──
    MATS.forEach(m=>{
      const rDay=(DAY_RATES[d]&&DAY_RATES[d][m.id]!=null)?DAY_RATES[d][m.id]:RATES[m.id];
      const rphDefault=rDay/24;
      const tA=dpA[m.id]||0, tN=dpN[m.id]||0;
      const amEndH=tA>0?Math.min(23,Math.floor(7+tA*m.lm/60)):null;
      const pmEndH=tN>0?Math.min(23,Math.floor(13+tN*m.lm/60)):null;
      for(let h=0;h<24;h++){
        // Priority: HOUR_RATES > FEED_SCHEDULE > DAY_RATES > global RATES
        let hrRate;
        if(HOUR_RATES[d]&&HOUR_RATES[d][m.id]&&HOUR_RATES[d][m.id][h]!=null){
          hrRate=HOUR_RATES[d][m.id][h];
        } else if(FEED_SCHEDULE.length>0&&DAY_RATES[d]&&DAY_RATES[d][m.id]!=null){
          // Day-level override takes priority over feed schedule
          hrRate=rphDefault;
        } else {
          const feedRate=getFeedRateAtHour(d,h,m.id);
          hrRate=(feedRate!=null)?feedRate:rphDefault;
        }
        if(m.t==='RM') stk[m.id]=Math.max(0,stk[m.id]-hrRate);
        else           stk[m.id]=Math.min(m.cap,stk[m.id]+hrRate);
        if(amEndH!==null&&h===amEndH){
          if(m.t==='WS') stk[m.id]=Math.max(0,stk[m.id]-tA*m.pv);
          else           stk[m.id]=Math.min(m.cap*.75,stk[m.id]+tA*m.pv);
        }
        if(pmEndH!==null&&h===pmEndH&&pmEndH!==amEndH){
          if(m.t==='WS') stk[m.id]=Math.max(0,stk[m.id]-tN*m.pv);
          else           stk[m.id]=Math.min(m.cap*.75,stk[m.id]+tN*m.pv);
        }
      }
    });

    let amE=0,noE=0;
    Object.keys(DX).forEach(k=>{if(dkAM[k])amE=Math.max(amE,T_AM+dkAM[k]);if(dkNO[k])noE=Math.max(noE,T_NO+dkNO[k]);});
    const endMin=Math.max(amE,noE)||T_AM, ot=Math.max(0,endMin-T_END);

    const sn={};
    MATS.forEach(m=>{
      const v=Math.max(0,stk[m.id]),p=Math.min(100,v/m.cap*100);
      let st='ok';
      if(m.t==='RM'){if(p<50)st='crit';else if(p<60)st='watch';else if(p>75)st='upper';}
      else{if(p>20)st='crit';else if(p>10)st='watch';}
      sn[m.id]={v:+v.toFixed(3),p:+p.toFixed(2),st};
    });

    const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const dt=new Date(2025,4,d);
    RES.push({d,dow:DOW[dt.getDay()],date:`${String(d).padStart(2,'0')} May`,dpA:{...dpA},dpN:{...dpN},endMin,ot,ok:!ot,sn});
  }
  updKPIs();buildDayList();showDay(SEL);
  if(document.getElementById('v-ov').classList.contains('on'))buildOv();
}

function updKPIs(){
  const comply=RES.filter(r=>r.ok).length;
  const total=RES.reduce((a,r)=>a+MATS.reduce((b,m)=>b+(r.dpA[m.id]||0)+(r.dpN[m.id]||0),0),0);
  const rmA=RES.reduce((a,r)=>a+RM_MATS.filter(id=>['crit','upper'].includes(r.sn[id].st)).length,0);
  const wsA=RES.reduce((a,r)=>a+WS_MATS.filter(id=>r.sn[id].st==='crit').length,0);
  document.getElementById('k1').textContent=`${comply}/31`;document.getElementById('k1').style.color=comply===31?'#56d364':'#fcd34d';
  document.getElementById('k2').textContent=total;
  document.getElementById('k3').textContent=rmA;document.getElementById('k3').style.color=rmA?'#f47067':'#56d364';
  document.getElementById('k4').textContent=wsA;document.getElementById('k4').style.color=wsA?'#f47067':'#56d364';
  document.getElementById('sl-tot').textContent=total+' trucks';
}

function buildDayList(){
  const el=document.getElementById('day-list');el.innerHTML='';
  RES.forEach(r=>{
    const barW=Math.min(100,(r.endMin-T_AM)/(T_END-T_AM)*100);
    const barC=r.ot?'#f0883e':r.endMin>T_AM+600?'#58a6ff':'#56d364';
    const endH=Math.floor(r.endMin/60),endM=r.endMin%60;
    const es=`${String(endH).padStart(2,'0')}:${String(endM).padStart(2,'0')}`;
    const numC=r.ot?'#f0883e':[1,2,3,4].some(id=>['crit','upper'].includes(r.sn[id].st))||[5,6,7,8].some(id=>r.sn[id].st==='crit')?'#f47067':'#c9d1d9';
    const div=document.createElement('div');
    div.className=`dr${r.d===SEL?' sel':''}`;div.id=`dr${r.d}`;
    div.innerHTML=`<div class="dr-num" style="color:${numC}">${r.d}</div><div class="dr-dow">${r.dow.slice(0,3)}</div><div class="dr-bar"><div class="dr-fill" style="width:${barW}%;background:${barC}"></div></div><div class="dr-end" style="color:${r.ot?'#f0883e':'#3a5070'}">${es}</div>${r.ot?'<div class="dr-ot">OT</div>':''}${OVR[r.d]?'<div class="dr-ovr">✏</div>':''}`;
    div.onclick=()=>showDay(r.d);
    el.appendChild(div);
  });
}

// ══════════════════════════════════════════════════
// GANTT CHART
// ══════════════════════════════════════════════════
function showDay(d){
  SEL=d;
  document.querySelectorAll('.dr').forEach(e=>e.classList.remove('sel'));
  const dr=document.getElementById('dr'+d);if(dr){dr.classList.add('sel');dr.scrollIntoView({block:'nearest'});}
  if(!RES.length)return;
  const r=RES.find(x=>x.d===d);if(!r)return;

  const endH=Math.floor(r.endMin/60),endM=r.endMin%60;
  const es=`${String(endH).padStart(2,'0')}:${String(endM).padStart(2,'0')}`;
  const dayT=MATS.reduce((a,m)=>a+(r.dpA[m.id]||0)+(r.dpN[m.id]||0),0);
  const totalMin=MATS.reduce((a,m)=>a+((r.dpA[m.id]||0)+(r.dpN[m.id]||0))*m.lm,0);

  document.getElementById('gh-day').textContent=`Day ${d} — ${r.dow}`;
  document.getElementById('gh-date').textContent=r.date;
  const otH=r.ot?` <span class="gh-ot">(+${Math.round(r.ot)}MIN OT)</span>`:'';
  // Build per-material rate/hr tooltip
  const rateInfo=MATS.map(m=>{const rate=(DAY_RATES[d]&&DAY_RATES[d][m.id]!=null)?DAY_RATES[d][m.id]:RATES[m.id];return `${m.s}:${(rate/24).toFixed(4)}/hr`;}).join(' · ');
  document.getElementById('gh-stat').innerHTML=`⏱ ${totalMin}min · END: ${es}${otH} · ${dayT} trucks <span style="font-size:9px;color:#2a4060;margin-left:6px" title="${rateInfo}">📊 Hourly sim</span>`;

  const WIN=T_END-T_AM; // 840 min

  let G=`<div class="g-axis"><span>07:00</span><span>10:30</span><span>14:00</span><span>17:30</span><span>21:00</span></div>`;

  // Total bar
  const totW=Math.min(100,totalMin/WIN*100);
  G+=`<div class="g-total"><div class="g-lbl-total">TOTAL</div><div class="g-track"><div class="g-total-fill" style="width:${totW.toFixed(1)}%"></div><div class="g-cutoff"></div></div><div class="g-time-end" style="color:${r.ot?'#f0883e':'#3a5070'}">${es}${r.ot?` <span style="color:#f0883e">+${Math.round(r.ot)}m</span>`:''}</div></div>`;

  // RM
  G+=`<div class="g-sep">Raw Materials — Inbound</div>`;
  MATS.filter(m=>m.t==='RM').forEach(m=>G+=ganttRow(m,r,WIN));
  // WS
  G+=`<div class="g-sep">Waste — Outbound</div>`;
  MATS.filter(m=>m.t==='WS').forEach(m=>G+=ganttRow(m,r,WIN));

  document.getElementById('gantt-body').innerHTML=G;

  // Also update table for the week containing this day
  WK=Math.floor((d-1)/7);
  renderSched();
}

function ganttRow(m,r,WIN){
  const col=MAT_COLORS[m.id]||'#58a6ff';
  const tA=r.dpA[m.id]||0, tN=r.dpN[m.id]||0, tot=tA+tN;
  if(!tot){
    return `<div class="g-row"><div class="g-mat-lbl"><div class="g-dot" style="background:${col};opacity:.25"></div><div class="g-name" style="opacity:.35">${m.n}</div></div><div class="g-track-row"><div class="g-end21"></div></div><div class="g-row-time" style="opacity:.25">—</div></div>`;
  }
  let bars='';
  if(tA>0){
    const dur=tA*m.lm;
    const left=(T_AM-T_AM)/WIN*100;
    const wid=Math.min(100-left,dur/WIN*100);
    bars+=`<div class="g-bar" style="left:${left.toFixed(2)}%;width:${wid.toFixed(2)}%;background:${col}" title="${m.n} AM: ${tA}×${m.lm}min=${dur}min"></div>`;
  }
  if(tN>0){
    const dur=tN*m.lm;
    const left=(T_NO-T_AM)/WIN*100;
    const wid=Math.min(100-left,dur/WIN*100);
    const col2=col+'bb';
    bars+=`<div class="g-bar" style="left:${left.toFixed(2)}%;width:${wid.toFixed(2)}%;background:${col2}" title="${m.n} PM: ${tN}×${m.lm}min=${dur}min"></div>`;
  }
  let latestEnd=0;
  if(tA>0)latestEnd=Math.max(latestEnd,T_AM+tA*m.lm);
  if(tN>0)latestEnd=Math.max(latestEnd,T_NO+tN*m.lm);
  const timeStr=`${tot*m.lm}min → ${fmt(latestEnd)}`;
  return `<div class="g-row"><div class="g-mat-lbl"><div class="g-dot" style="background:${col}"></div><div class="g-name">${m.n}</div></div><div class="g-track-row">${bars}<div class="g-end21"></div></div><div class="g-row-time">${timeStr}</div></div>`;
}

// ══════════════════════════════════════════════════
// WEEKLY TABLE
// ══════════════════════════════════════════════════
function wkDays(){const days=[];for(let i=0;i<7;i++){const d=WK*7+1+i;if(d<=DAYS)days.push(d);}return days;}

function renderSched(){
  const days=wkDays();
  const d0=days[0],dN=days[days.length-1];
  document.getElementById('wk-title').textContent=`May ${String(d0).padStart(2,'0')}–${String(dN).padStart(2,'0')}, 2025`;
  const NC=6+days.length*3;
  let H=`<table><colgroup><col class="ch-no"><col class="ch-mat"><col class="ch-io"><col class="ch-abc"><col class="ch-pv"><col class="ch-sta">`;
  days.forEach(()=>H+=`<col class="ch-am"><col class="ch-pm"><col class="ch-tr">`);
  H+=`</colgroup><tr class="hdr-top"><td class="th-fixed" rowspan="2">No.</td><td class="th-fixed" rowspan="2">Material</td><td class="th-fixed" rowspan="2">I/O</td><td class="th-fixed" rowspan="2">ABC</td><td class="th-fixed" rowspan="2"><div>Trucks</div><div>/Trip</div></td><td class="th-fixed" rowspan="2">Station</td>`;
  days.forEach(d=>{
    const r=RES[d-1];
    const ot=r&&r.ot>0?' ⚡':'';
    const bg=r&&r.ot>0?'background:#5a1d00;color:#f0883e':d===SEL?'background:#0d2040;border-bottom:2px solid #58a6ff':'';
    H+=`<td class="th-fixed" colspan="3" style="${bg}">${r?r.dow:''} ${d}${ot}</td>`;
  });
  H+=`</tr><tr class="hdr-sub">`;
  days.forEach(()=>H+=`<td><span class="slot-lbl">AM Slot</span><span class="slot-time">07–13:00</span></td><td><span class="slot-lbl">PM Slot</span><span class="slot-time">13–21:00</span></td><td><span class="slot-lbl">🚛</span><span class="slot-time">Trips</span></td>`);
  H+=`</tr><tr><td class="grp-rm" colspan="${NC}">RAW MATERIALS – Inbound</td></tr>`;
  MATS.filter(m=>m.t==='RM').forEach(m=>H+=matRow(m,days));
  H+=`<tr><td class="grp-ws" colspan="${NC}">WASTE – Outbound (Pickup / Disposal)</td></tr>`;
  MATS.filter(m=>m.t==='WS').forEach(m=>H+=matRow(m,days));
  H+=`</table>`;
  document.getElementById('tbl').innerHTML=H;
}

function matRow(m,days){
  const ioH=m.io==='IN'?`<span class="io-in">IN</span>`:`<span class="io-out">OUT</span>`;
  const ac={A:'abc-a',B:'abc-b',C:'abc-c'}[m.a]||'abc-b';
  const rc=m.t==='RM'?'row-rm':'row-ws';
  let H=`<tr class="${rc}"><td class="td-no">${m.id}</td><td class="td-mat">${m.ln||m.n}</td><td class="td-io">${ioH}</td><td class="td-abc ${ac}">${m.a}</td><td class="td-pv">${m.pv}</td><td class="td-sta"><span class="sta-pill">${m.sta}<span class="sta-star">★</span></span></td>`;
  days.forEach(d=>{
    const r=RES[d-1];
    if(!r){H+=`<td class="td-slot"></td><td class="td-slot"></td><td class="td-trip"></td>`;return;}
    const tA=r.dpA[m.id]||0,tN=r.dpN[m.id]||0,tot=tA+tN;
    const amS=tA?slotStr(T_AM,tA,m.lm):null;
    const pmS=tN?slotStr(T_NO,tN,m.lm):null;
    const amH=amS?`<span class="slot-am" onclick="openM(${d},${m.id})">${amS}</span>`:`<span class="slot-empty" onclick="openM(${d},${m.id})"></span>`;
    const pmH=pmS?`<span class="slot-pm" onclick="openM(${d},${m.id})">${pmS}</span>`:`<span class="slot-empty" onclick="openM(${d},${m.id})"></span>`;
    const trH=tot?`<span class="trip-badge" onclick="openM(${d},${m.id})">${tot}</span>`:`<span class="trip-zero" onclick="openM(${d},${m.id})"></span>`;
    H+=`<td class="td-slot">${amH}</td><td class="td-slot">${pmH}</td><td class="td-trip">${trH}</td>`;
  });
  H+=`</tr>`;return H;
}

function togTbl(){
  tblOpen=!tblOpen;
  const c=document.getElementById('tbl-col');
  c.style.maxHeight=tblOpen?'':0;c.style.overflow=tblOpen?'auto':'hidden';
  document.getElementById('tt-arr').textContent=tblOpen?'▼':'▶';
}

function prevWk(){if(WK>0){WK--;renderSched();}}
function nextWk(){if((WK+1)*7<DAYS){WK++;renderSched();}}
