// MODAL
// ══════════════════════════════════════════════════
function openM(d,id){
  mDay=d;mId=id;
  const m=M[id],r=RES[d-1];
  const tA=r?r.dpA[id]||0:0,tN=r?r.dpN[id]||0:0,tot=tA+tN;
  const sn=r?r.sn[id]:null;
  const maxT=m.mp||(id===7?7:DX[m.dk]);
  const effRate=(DAY_RATES[d]&&DAY_RATES[d][id]!=null)?DAY_RATES[d][id]:RATES[id];
  const hrRate=(effRate/24).toFixed(4);
  document.getElementById('m-title').textContent=`Day ${d} (${r?r.dow:'?'}) — ${m.ln||m.n}`;
  document.getElementById('m-sub').innerHTML=`${m.dk} · ${m.pk} · ${m.pv} per truck · ${m.lm} min/truck · Max ${maxT} &nbsp;<span style="font-family:monospace;font-size:10px;color:#58a6ff;background:#0d1f3a;padding:1px 6px;border-radius:3px;border:1px solid #1d3a6a">⏱ ${hrRate} ${m.t==='RM'?'T':'m³'}/hr · ${effRate} ${m.t==='RM'?'T':'m³'}/day</span>`;
  document.getElementById('m-lbl').textContent=`Trucks (0–${maxT})`;
  document.getElementById('m-inp').value=tot;
  document.getElementById('m-inp').max=maxT;
  if(sn)document.getElementById('m-stock').innerHTML=`📦 Stock end-of-day: <b>${sn.p.toFixed(1)}%</b> (${sn.v.toFixed(2)} ${m.t==='RM'?'T':'m³'}) — <b style="color:${stCol(sn.st)}">${sn.st.toUpperCase()}</b>`;
  else document.getElementById('m-stock').textContent='';
  document.getElementById('modal').classList.add('on');
  setTimeout(()=>document.getElementById('m-inp').select(),50);
}
function stCol(s){return{ok:'#56d364',watch:'#e3b341',crit:'#f47067',upper:'#f0883e'}[s]||'#8b949e';}
function mClose(){document.getElementById('modal').classList.remove('on');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))mClose();});
function mApply(){
  const t=parseInt(document.getElementById('m-inp').value)||0;
  if(!OVR[mDay]){const r=RES[mDay-1];OVR[mDay]={};if(r)MATS.forEach(mm=>OVR[mDay][mm.id]=(r.dpA[mm.id]||0)+(r.dpN[mm.id]||0));}
  OVR[mDay][mId]=t;
  mClose();runSim();toast(`Day ${mDay} · ${M[mId].n}: ${t} trucks ✓`);
}
function mAuto(){
  if(OVR[mDay]){delete OVR[mDay][mId];if(!Object.keys(OVR[mDay]).length)delete OVR[mDay];}
  mClose();runSim();toast(`Day ${mDay} · ${M[mId].n} reset to auto ✓`);
}

// ══════════════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════════════
function buildSet(){
  const d=SET_DAY; // 0=global, 1-31=specific day
  const hasGlobalOvr=Object.keys(DAY_RATES).length>0;

  // Day selector tabs
  let tabH=`<div class="set-day-tabs">
    <div class="sdt${d===0?' on':hasGlobalOvr?'':''}" onclick="setSetDay(0)" title="Global defaults">All</div>`;
  for(let i=1;i<=31;i++){
    const hasOvr=DAY_RATES[i]&&Object.keys(DAY_RATES[i]).length;
    tabH+=`<div class="sdt${d===i?' on':''}${hasOvr?' has-ovr':''}" onclick="setSetDay(${i})" title="Day ${i}">${i}</div>`;
  }
  tabH+=`</div>`;

  let noteH='';
  if(d===0){
    noteH=`<div class="set-day-note">⚙ <b>Global defaults</b> — apply to all days unless a day-specific rate is set. Changes here affect all days without overrides.</div>`;
  } else {
    const r=RES[d-1];
    const dow=r?r.dow:'—';
    const hasOvr=DAY_RATES[d]&&Object.keys(DAY_RATES[d]).length;
    noteH=`<div class="set-day-note">📅 <b>Day ${d} (${dow})</b> — set individual rates for this day only. Leave blank to use global defaults.${hasOvr?` <span style="color:#e6b84a">· Has overrides</span>`:''}</div>`;
  }

  // Stock card (always global)
  let sH=`<div class="set-card"><div class="set-card-hdr">On-Hand Starting Stock (Day 1)</div>`;
  MATS.forEach(m=>{const v=INIT[m.id]||0;
    sH+=`<div class="srow"><div><div class="srow-lbl">${m.ln||m.n} <span style="font-size:10px;color:#484f58">(${m.t}-${m.a})</span></div><div class="srow-sub" id="ssp${m.id}">${(v/m.cap*100).toFixed(1)}% of ${m.cap}</div></div><input class="srow-inp" type="number" id="ssi${m.id}" min="0" max="${m.cap}" step=".01" value="${v}" oninput="updSt(${m.id},this.value)"><div class="srow-unit">${m.t==='RM'?'T':'m³'}</div></div>`;
  });sH+=`</div>`;

  // Rate card — global or day-specific
  let rH=`<div class="set-card"><div class="set-card-hdr">${d===0?'Daily Consumption / Production Rates (Global)':'Day '+d+' Rate Overrides'}</div>${tabH}${noteH}`;
  MATS.forEach(m=>{
    const globalVal=RATES[m.id];
    const dayVal=d>0&&DAY_RATES[d]?DAY_RATES[d][m.id]:undefined;
    const showVal=d===0?globalVal:(dayVal!=null?dayVal:'');
    const isOvr=d>0&&dayVal!=null;
    const effVal=isOvr?dayVal:globalVal;
    const hrVal=(effVal/24).toFixed(4);
    const tag=isOvr?`<span class="rate-ovr-tag">✏ override</span>`:(d>0?`<span class="rate-default-tag">(default: ${globalVal})</span>`:'');
    const resetBtn=isOvr?`<button class="rate-reset-btn" onclick="clearDayRate(${d},${m.id})" title="Clear override">✕</button>`:'';
    const unit=m.t==='RM'?'T':'m³';
    rH+=`<div class="srow"><div><div class="srow-lbl">${m.ln||m.n}${tag}</div><div class="srow-sub">${m.t==='RM'?'Consumption':'Production'} · <span style="color:#58a6ff;font-family:monospace">${hrVal} ${unit}/hr</span> · ${effVal||globalVal} ${unit}/day</div></div>${resetBtn}<input class="srow-inp" type="number" id="sri${m.id}" min="0" step=".001" value="${showVal}" placeholder="${d>0?globalVal:''}" oninput="updRt(${m.id},this.value,${d})" style="${isOvr?'border-color:#e6b84a;color:#e6b84a':''}"><div class="srow-unit">${unit}/d</div></div>`;
  });rH+=`</div>`;

  // Delivery volume card
  let vH=`<div class="set-card"><div class="set-card-hdr">🚛 Delivery Volume per Truck</div>`;
  vH+=`<div style="padding:4px 12px 8px;font-size:10px;color:#3a5070">Volume loaded/unloaded per truck per trip. Affects stock change per delivery and logistics cost calculations.</div>`;
  MATS.forEach(m=>{
    const unit=m.t==='RM'?'T':'m³';
    const isDefault=m.pv===MATS_DEFAULT_PV[m.id];
    const changed=!isDefault;
    vH+=`<div class="srow">
      <div>
        <div class="srow-lbl">${m.ln||m.n} <span style="font-size:10px;color:#484f58">(${m.t}-${m.a})</span>
          ${changed?`<span class="rate-ovr-tag">✏ modified</span>`:''}
        </div>
        <div class="srow-sub">
          ${m.t==='RM'?'Inbound':'Outbound'} ·
          <span style="color:#58a6ff;font-family:monospace">${m.pv} ${unit}/truck</span> ·
          <span style="color:#3a5070">Min load time: ${m.lm} min/truck</span>
          ${changed?`<button class="rate-reset-btn" onclick="resetPv(${m.id})" title="Reset to default">↺</button>`:''}
        </div>
      </div>
      <input class="srow-inp${changed?' grv-adj-changed':''}" type="number" id="spv${m.id}" min="0.1" max="500" step="0.1" value="${m.pv}"
        oninput="updPv(${m.id},this.value)" style="${changed?'border-color:#e6b84a;color:#e6b84a':''}">
      <div class="srow-unit">${unit}/trk</div>
    </div>`;
  });
  vH+=`</div>`;

  document.getElementById('set-g').innerHTML=sH+rH+vH+buildPresetCard()+
    `<div class="set-actions"><button class="btn-blue" onclick="applySet()">▶ Apply & Re-run</button><button class="btn-outline" onclick="resetSet()">↺ Reset All Defaults</button></div>`;
}

function updPv(id,v){
  const val=Math.max(0.1,parseFloat(v)||0.1);
  M[id].pv=val;
  MATS.forEach(m=>{if(m.id===id)m.pv=val;});
  markUnsaved();
}
function resetPv(id){
  M[id].pv=MATS_DEFAULT_PV[id];
  MATS.forEach(m=>{if(m.id===id)m.pv=MATS_DEFAULT_PV[id];});
  const el=document.getElementById('spv'+id);
  if(el)el.value=MATS_DEFAULT_PV[id];
  markUnsaved();buildSet();
}

function setSetDay(d){SET_DAY=d;buildSet();}

function clearDayRate(d,id){
  if(DAY_RATES[d]){delete DAY_RATES[d][id];if(!Object.keys(DAY_RATES[d]).length)delete DAY_RATES[d];}
  buildSet();markUnsaved();
}

function updSt(id,v){INIT[id]=Math.max(0,Math.min(M[id].cap,parseFloat(v)||0));const el=document.getElementById('ssp'+id);if(el)el.textContent=`${(INIT[id]/M[id].cap*100).toFixed(1)}% of ${M[id].cap}`;}
function updRt(id,v,day){
  const val=v===''?null:Math.max(0,parseFloat(v)||0);
  if(!day||day===0){
    // Global rate
    if(val!==null)RATES[id]=val;
  } else {
    // Day-specific override
    if(val!==null){
      if(!DAY_RATES[day])DAY_RATES[day]={};
      DAY_RATES[day][id]=val;
    }
  }
  markUnsaved();
}
function applySet(){
  const d=SET_DAY;
  MATS.forEach(m=>{
    const si=document.getElementById('ssi'+m.id);
    const ri=document.getElementById('sri'+m.id);
    const pi=document.getElementById('spv'+m.id);
    if(si)INIT[m.id]=Math.max(0,Math.min(m.cap,parseFloat(si.value)||0));
    if(ri&&ri.value!==''){
      const val=Math.max(0,parseFloat(ri.value)||0);
      if(d===0){RATES[m.id]=val;}
      else{if(!DAY_RATES[d])DAY_RATES[d]={};DAY_RATES[d][m.id]=val;}
    }
    if(pi&&pi.value!==''){
      m.pv=Math.max(0.1,parseFloat(pi.value)||0.1);
      M[m.id].pv=m.pv;
    }
  });
  OVR={};runSim();buildSet();markUnsaved();toast('Applied — re-optimized ✓');
}
function resetSet(){
  MATS.forEach(m=>RATES[m.id]=m.rate);
  DAY_RATES={};
  INIT={1:+(88*.3575).toFixed(3),2:+Math.min(23,23*.308+11.25).toFixed(3),3:+Math.min(25,25*.16+10).toFixed(3),4:+(12.2*.5).toFixed(3),5:0,6:+(180*.201).toFixed(3),7:0,8:+(569.305*.66).toFixed(3)};
  OVR={};SET_DAY=0;runSim();buildSet();markUnsaved();toast('Reset all to defaults ✓');
}

// ══════════════════════════════════════════════════
// OVERVIEW
// ══════════════════════════════════════════════════
function fmtBaht(v){
  if(v>=1000000)return (v/1000000).toFixed(2)+'M';
  if(v>=1000)return (v/1000).toFixed(1)+'K';
  return v.toFixed(0);
}
function fmtBahtFull(v){return v.toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:0})+' ฿';}

function calcDayCost(r){
  var rmCost=0, wsCost=0;
  // RM: cost per T × volume delivered that day
  [1,2,3,4].forEach(function(id){
    var tA=r.dpA[id]||0, tN=r.dpN[id]||0;
    var m=M[id];
    var vol=(tA+tN)*m.pv;
    rmCost+=vol*COST_RM[id];
  });
  // WS 5 & 6: cost per truck
  [5,6].forEach(function(id){
    var trucks=(r.dpA[id]||0)+(r.dpN[id]||0);
    wsCost+=trucks*COST_WS_FIXED[id];
  });
  // WS 7: WW — chosen option
  var ww7=(r.dpA[7]||0)+(r.dpN[7]||0);
  if(ww7>0) wsCost+=COST_WW_OPTS[COST_WW_SEL].fn(ww7,M[7].pv);
  // WS 8: CW — chosen option
  var cw8=(r.dpA[8]||0)+(r.dpN[8]||0);
  if(cw8>0) wsCost+=COST_CW_OPTS[COST_CW_SEL].fn(cw8,M[8].pv);
  return {rm:rmCost, ws:wsCost, total:rmCost+wsCost};
}

function setCostOpt(matId,idx){
  if(matId===7)COST_WW_SEL=idx;
  else COST_CW_SEL=idx;
  buildCostSection();
}

function buildCostSection(){
  var el=document.getElementById('ov-cost');
  if(!el)return;

  // Monthly totals per material
  var matTotals={};
  MATS.forEach(function(m){matTotals[m.id]={trucks:0,vol:0,cost:0};});
  var totRM=0,totWS=0;

  RES.forEach(function(r){
    [1,2,3,4].forEach(function(id){
      var trucks=(r.dpA[id]||0)+(r.dpN[id]||0);
      var vol=trucks*M[id].pv;
      var cost=vol*COST_RM[id];
      matTotals[id].trucks+=trucks;matTotals[id].vol+=vol;matTotals[id].cost+=cost;
      totRM+=cost;
    });
    [5,6].forEach(function(id){
      var trucks=(r.dpA[id]||0)+(r.dpN[id]||0);
      var cost=trucks*COST_WS_FIXED[id];
      matTotals[id].trucks+=trucks;matTotals[id].vol+=trucks*M[id].pv;matTotals[id].cost+=cost;
      totWS+=cost;
    });
    var ww7=(r.dpA[7]||0)+(r.dpN[7]||0);
    if(ww7>0){var c7=COST_WW_OPTS[COST_WW_SEL].fn(ww7,M[7].pv);matTotals[7].trucks+=ww7;matTotals[7].cost+=c7;totWS+=c7;}
    var cw8=(r.dpA[8]||0)+(r.dpN[8]||0);
    if(cw8>0){var c8=COST_CW_OPTS[COST_CW_SEL].fn(cw8,M[8].pv);matTotals[8].trucks+=cw8;matTotals[8].cost+=c8;totWS+=c8;}
  });
  var grandTotal=totRM+totWS;

  var H='<div class="cost-wrap">';

  // Header
  H+='<div class="cost-hdr"><div><div class="cost-hdr-title">💰 Logistics Cost Summary — May 2025</div>'
    +'<div class="cost-hdr-sub">31 days · Inbound (Raw Materials) + Outbound (Waste Streams)</div></div></div>';

  // Option selectors for WW & CW
  H+='<div class="cost-opts">'
    +'<div class="cost-opt-group">'
    +'<span class="cost-opt-lbl">🚛 Wastewater (WW) Rate:</span>'
    +'<select class="cost-opt-sel" onchange="setCostOpt(7,+this.value)">'
    +COST_WW_OPTS.map(function(o,i){return '<option value="'+i+'"'+(i===COST_WW_SEL?' selected':'')+'>'+o.label+'</option>';}).join('')
    +'</select></div>'
    +'<div class="cost-opt-group">'
    +'<span class="cost-opt-lbl">🚛 Cont. Water (CW) Rate:</span>'
    +'<select class="cost-opt-sel" onchange="setCostOpt(8,+this.value)">'
    +COST_CW_OPTS.map(function(o,i){return '<option value="'+i+'"'+(i===COST_CW_SEL?' selected':'')+'>'+o.label+'</option>';}).join('')
    +'</select></div>'
    +'</div>';

  // Total cards
  H+='<div class="cost-total-row">'
    +'<div class="cost-total-card rm"><div class="cost-total-label">📦 Inbound (RM) Total</div>'
    +'<div class="cost-total-val">'+fmtBahtFull(totRM)+'</div>'
    +'<div class="cost-total-sub">Raw material logistics</div></div>'
    +'<div class="cost-total-card ws"><div class="cost-total-label">🗑 Outbound (WS) Total</div>'
    +'<div class="cost-total-val">'+fmtBahtFull(totWS)+'</div>'
    +'<div class="cost-total-sub">Waste disposal logistics</div></div>'
    +'<div class="cost-total-card grand"><div class="cost-total-label">💰 Grand Total</div>'
    +'<div class="cost-total-val">'+fmtBahtFull(grandTotal)+'</div>'
    +'<div class="cost-total-sub">All logistics · 31 days</div></div>'
    +'<div class="cost-total-card" style="border-color:#2a3020"><div class="cost-total-label">📅 Avg Cost / Day</div>'
    +'<div class="cost-total-val" style="color:#e3b341;font-size:18px">'+fmtBahtFull(grandTotal/31)+'</div>'
    +'<div class="cost-total-sub">Monthly avg</div></div>'
    +'</div>';

  // Per-material breakdown
  H+='<div class="cost-grid">';

  // RM card
  H+='<div class="cost-card"><div class="cost-card-hdr rm">📦 Inbound — Raw Materials (cost per T)</div><div class="cost-card-body">';
  [1,2,3,4].forEach(function(id){
    var m=M[id],mt=matTotals[id];
    var col=GRC[id]||'#58a6ff';
    H+='<div class="cost-row">'
      +'<div class="cost-mat-dot" style="background:'+col+'"></div>'
      +'<div class="cost-mat-name">'+m.n+'</div>'
      +'<div class="cost-mat-trucks">'+mt.trucks+' trk</div>'
      +'<div class="cost-mat-rate">'+mt.vol.toFixed(1)+' T</div>'
      +'<div class="cost-mat-rate" style="color:#3a5070">'+COST_RM[id]+' ฿/T</div>'
      +'<div class="cost-mat-cost">'+fmtBahtFull(mt.cost)+'</div>'
      +'</div>';
  });
  H+='</div></div>';

  // WS card
  H+='<div class="cost-card"><div class="cost-card-hdr ws">🗑 Outbound — Waste Streams (cost per truck)</div><div class="cost-card-body">';
  [5,6,7,8].forEach(function(id){
    var m=M[id],mt=matTotals[id];
    var col=GRC[id]||'#a371f7';
    var rateStr=id===5?'48,000 ฿/trk':id===6?'92,000 ฿/trk':id===7?COST_WW_OPTS[COST_WW_SEL].label:COST_CW_OPTS[COST_CW_SEL].label;
    H+='<div class="cost-row">'
      +'<div class="cost-mat-dot" style="background:'+col+'"></div>'
      +'<div class="cost-mat-name">'+m.n+'</div>'
      +'<div class="cost-mat-trucks">'+mt.trucks+' trk</div>'
      +'<div class="cost-mat-rate" style="color:#3a5070;font-size:9px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+rateStr+'">'+rateStr+'</div>'
      +'<div class="cost-mat-cost">'+fmtBahtFull(mt.cost)+'</div>'
      +'</div>';
  });
  H+='</div></div>';
  H+='</div>';

  // Daily cost table
  H+='<div class="cost-sect-title">📋 Daily Logistics Cost Breakdown</div>';
  H+='<table class="cost-daily-tbl"><thead><tr>'
    +'<th>Day</th><th>DOW</th>'
    +'<th>BE</th><th>FA</th><th>CA</th><th>CS</th>'
    +'<th>SBE</th><th>AG</th><th>WW</th><th>CW</th>'
    +'<th>RM Total</th><th>WS Total</th><th>Day Total</th>'
    +'</tr></thead><tbody>';

  var dayGrandTotal=0;
  RES.forEach(function(r){
    var rmCosts=[1,2,3,4].map(function(id){
      return ((r.dpA[id]||0)+(r.dpN[id]||0))*M[id].pv*COST_RM[id];
    });
    var wsCosts=[];
    [5,6].forEach(function(id){
      wsCosts.push(((r.dpA[id]||0)+(r.dpN[id]||0))*COST_WS_FIXED[id]);
    });
    var ww7=(r.dpA[7]||0)+(r.dpN[7]||0);
    wsCosts.push(ww7>0?COST_WW_OPTS[COST_WW_SEL].fn(ww7,M[7].pv):0);
    var cw8=(r.dpA[8]||0)+(r.dpN[8]||0);
    wsCosts.push(cw8>0?COST_CW_OPTS[COST_CW_SEL].fn(cw8,M[8].pv):0);
    var dayRM=rmCosts.reduce(function(a,b){return a+b;},0);
    var dayWS=wsCosts.reduce(function(a,b){return a+b;},0);
    var dayTot=dayRM+dayWS;
    dayGrandTotal+=dayTot;
    var hasCost=dayTot>0;
    H+='<tr>'
      +'<td>'+r.d+'</td><td style="color:#3a5070">'+r.dow.slice(0,3)+'</td>'
      +rmCosts.map(function(c){return '<td>'+(c>0?fmtBaht(c):'—')+'</td>';}).join('')
      +wsCosts.map(function(c){return '<td>'+(c>0?fmtBaht(c):'—')+'</td>';}).join('')
      +'<td class="tc" style="color:#79c0ff">'+(dayRM>0?fmtBaht(dayRM):'—')+'</td>'
      +'<td class="tc" style="color:#d2a8ff">'+(dayWS>0?fmtBaht(dayWS):'—')+'</td>'
      +'<td class="tc hi">'+(hasCost?fmtBaht(dayTot):'—')+'</td>'
      +'</tr>';
  });
  H+='<tr style="background:#0e1520;font-weight:700">'
    +'<td colspan="2" style="color:#3a5070;font-size:9px">TOTAL</td>'
    +[1,2,3,4].map(function(id){return '<td style="color:#79c0ff">'+fmtBaht(matTotals[id].cost)+'</td>';}).join('')
    +[5,6,7,8].map(function(id){return '<td style="color:#d2a8ff">'+fmtBaht(matTotals[id].cost)+'</td>';}).join('')
    +'<td style="color:#79c0ff;font-weight:700">'+fmtBaht(totRM)+'</td>'
    +'<td style="color:#d2a8ff;font-weight:700">'+fmtBaht(totWS)+'</td>'
    +'<td style="color:#3fb950;font-weight:700">'+fmtBaht(grandTotal)+'</td>'
    +'</tr>';
  H+='</tbody></table></div>';

  el.innerHTML=H;
}

function buildOv(){
  const SC={ok:'ov-ok',watch:'ov-watch',crit:'ov-crit',upper:'ov-upper'};
  let H=`<table class="ov-table"><thead><tr><th>Day</th><th>DOW</th><th>Trucks</th><th>End</th>`;
  MATS.forEach(m=>H+=`<th title="${m.ln||m.n}">${m.s||m.n.slice(0,3)}</th>`);
  H+=`</tr>
  <tr style="background:#0b1525">
    <td colspan="4" style="text-align:right;color:#2a4060;font-size:9px;padding:3px 8px">⏱ Rate/hr →</td>`;
  MATS.forEach(m=>{
    const r=(DAY_RATES[0]&&DAY_RATES[0][m.id]!=null)?DAY_RATES[0][m.id]:RATES[m.id];
    const unit=m.t==='RM'?'T':'m³';
    H+=`<td style="color:#58a6ff;font-size:9px;padding:3px 6px" title="${r} ${unit}/day">${(r/24).toFixed(4)}</td>`;
  });
  H+=`</tr></thead><tbody>`;
  RES.forEach(r=>{
    const tot=MATS.reduce((a,m)=>a+(r.dpA[m.id]||0)+(r.dpN[m.id]||0),0);
    H+=`<tr onclick="goView('sch');showDay(${r.d})"><td style="font-weight:700;color:${r.ot?'#f0883e':'#c9d1d9'}">${r.d}</td><td>${r.dow.slice(0,3)}</td><td style="color:#f0883e;font-weight:700">${tot}</td><td style="color:${r.ot?'#f0883e':'#56d364'}">${fmt(r.endMin)}</td>`;
    MATS.forEach(m=>H+=`<td class="${SC[r.sn[m.id].st]}">${r.sn[m.id].p.toFixed(0)}%</td>`);
    H+=`</tr>`;
  });
  H+=`</tbody></table>`;
  document.getElementById('ov-c').innerHTML=H;
  buildCostSection();
}

// SAVE / LOAD (localStorage)
// ══════════════════════════════════════════════════
const SAVE_KEY='sfp_schedule_v1';
let _unsaved=false;

function markUnsaved(){
  _unsaved=true;
  const el=document.getElementById('save-status');
  if(el)el.innerHTML='<span class="unsaved">● Unsaved changes</span>';
}
function markSaved(){
  _unsaved=false;
  const el=document.getElementById('save-status');
  if(el){
    const now=new Date();
    el.innerHTML=`<span class="saved">✓ Saved ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}</span>`;
  }
}

function saveProgress(){
  try{
    const pvMap={};MATS.forEach(m=>pvMap[m.id]=m.pv);
    const data={INIT,RATES,DAY_RATES,HOUR_RATES,FEED_SCHEDULE,PROC,OVR,SEL,WK,PRESETS,PLANS,ACTIVE_PLAN,pvMap,v:1};
    localStorage.setItem(SAVE_KEY,JSON.stringify(data));
    markSaved();
    toast('Progress saved ✓');
  }catch(e){toast('Save failed: '+e.message);}
}

function loadProgress(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw){toast('No saved data found');return;}
    const data=JSON.parse(raw);
    if(data.INIT)  Object.assign(INIT,data.INIT);
    if(data.RATES) Object.assign(RATES,data.RATES);
    if(data.DAY_RATES) Object.assign(DAY_RATES,data.DAY_RATES);
    if(data.HOUR_RATES) Object.assign(HOUR_RATES,data.HOUR_RATES);
    if(data.FEED_SCHEDULE&&Array.isArray(data.FEED_SCHEDULE)){FEED_SCHEDULE.splice(0,FEED_SCHEDULE.length,...data.FEED_SCHEDULE);}
    if(data.PROC)Object.assign(PROC,data.PROC);
    if(data.pvMap){MATS.forEach(m=>{if(data.pvMap[m.id]!=null){m.pv=data.pvMap[m.id];M[m.id].pv=m.pv;}});}
    if(data.OVR)   Object.assign(OVR,data.OVR);
    if(data.PRESETS&&Array.isArray(data.PRESETS))PRESETS.splice(0,PRESETS.length,...data.PRESETS);
    if(data.PLANS&&Array.isArray(data.PLANS)){PLANS.splice(0,PLANS.length,...data.PLANS.filter(Boolean));}
    if(data.ACTIVE_PLAN!=null)ACTIVE_PLAN=data.ACTIVE_PLAN;
    if(data.PLANS&&Array.isArray(data.PLANS)){PLANS.splice(0,PLANS.length,...data.PLANS.filter(Boolean));}
    if(data.ACTIVE_PLAN!=null)ACTIVE_PLAN=data.ACTIVE_PLAN;
    if(data.SEL)   SEL=data.SEL;
    if(data.WK)    WK=data.WK;
    runSim();
    if(document.getElementById('v-set').classList.contains('on'))buildSet();
    markSaved();
    toast('Progress loaded ✓');
  }catch(e){toast('Load failed: '+e.message);}
}

function clearSave(){
  if(!confirm('Clear all saved progress? This cannot be undone.'))return;
  localStorage.removeItem(SAVE_KEY);
  markUnsaved();
  toast('Save data cleared');
}

function autoLoadOnBoot(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return;
    const data=JSON.parse(raw);
    if(data.v!==1)return;
    if(data.INIT)  Object.assign(INIT,data.INIT);
    if(data.RATES) Object.assign(RATES,data.RATES);
    if(data.DAY_RATES)Object.assign(DAY_RATES,data.DAY_RATES);
    if(data.HOUR_RATES)Object.assign(HOUR_RATES,data.HOUR_RATES);
    if(data.FEED_SCHEDULE&&Array.isArray(data.FEED_SCHEDULE)){FEED_SCHEDULE.splice(0,FEED_SCHEDULE.length,...data.FEED_SCHEDULE);}
    if(data.PROC)Object.assign(PROC,data.PROC);
    if(data.pvMap){MATS.forEach(m=>{if(data.pvMap[m.id]!=null){m.pv=data.pvMap[m.id];M[m.id].pv=m.pv;}});}
    if(data.OVR)   Object.assign(OVR,data.OVR);
    if(data.PRESETS&&Array.isArray(data.PRESETS))PRESETS.splice(0,PRESETS.length,...data.PRESETS);
    if(data.PLANS&&Array.isArray(data.PLANS)){PLANS.splice(0,PLANS.length,...data.PLANS.filter(Boolean));}
    if(data.ACTIVE_PLAN!=null)ACTIVE_PLAN=data.ACTIVE_PLAN;
    if(data.SEL)   SEL=data.SEL;
    if(data.WK!=null)WK=data.WK;
    markSaved();
  }catch(e){console.warn('Auto-load failed:',e);}
}

document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveProgress();}});

function presetId(){ return 'p_'+Date.now()+'_'+Math.random().toString(36).slice(2,6); }

function savePreset(){
  const nameEl=document.getElementById('preset-name-inp');
  const name=(nameEl?nameEl.value.trim():'');
  if(!name){toast('Enter a preset name first');return;}
  // Capture current global rates as the preset
  const rates={};MATS.forEach(m=>rates[m.id]=RATES[m.id]);
  PRESETS.push({id:presetId(),name,rates,appliedDays:[]});
  if(nameEl)nameEl.value='';
  markUnsaved();buildSet();toast(`Preset "${name}" saved ✓`);
}

function savePresetFromDay(d){
  const nameEl=document.getElementById('preset-name-inp');
  const name=(nameEl?nameEl.value.trim():'')||`Day ${d} rates`;
  const rates={};
  MATS.forEach(m=>{
    const dayR=DAY_RATES[d]&&DAY_RATES[d][m.id]!=null?DAY_RATES[d][m.id]:RATES[m.id];
    rates[m.id]=dayR;
  });
  PRESETS.push({id:presetId(),name,rates,appliedDays:[]});
  if(nameEl)nameEl.value='';
  markUnsaved();buildSet();toast(`Preset "${name}" saved from Day ${d} ✓`);
}

function deletePreset(pid){
  const i=PRESETS.findIndex(p=>p.id===pid);
  if(i<0)return;
  const name=PRESETS[i].name;
  PRESETS.splice(i,1);
  if(PRESET_EDIT_ID===pid)PRESET_EDIT_ID=null;
  markUnsaved();buildSet();toast(`Preset "${name}" deleted`);
}

function applyPresetToGlobal(pid){
  const p=PRESETS.find(x=>x.id===pid);if(!p)return;
  MATS.forEach(m=>{if(p.rates[m.id]!=null)RATES[m.id]=p.rates[m.id];});
  runSim();buildSet();markUnsaved();toast(`Preset "${p.name}" applied to global rates ✓`);
}

function showApplyPanel(pid){
  PRESET_EDIT_ID=(PRESET_EDIT_ID===pid?null:pid);
  buildSet();
}

function applyPresetToDays(pid){
  const p=PRESETS.find(x=>x.id===pid);if(!p)return;
  const checked=document.querySelectorAll('.dc-chk:checked');
  const days=[...checked].map(c=>parseInt(c.value));
  if(!days.length){toast('Select at least one day');return;}
  days.forEach(d=>{
    if(!DAY_RATES[d])DAY_RATES[d]={};
    MATS.forEach(m=>{if(p.rates[m.id]!=null)DAY_RATES[d][m.id]=p.rates[m.id];});
    // Track which preset was applied to this day (optional metadata)
    if(!p.appliedDays.includes(d))p.appliedDays.push(d);
  });
  PRESET_EDIT_ID=null;
  runSim();buildSet();markUnsaved();
  toast(`Preset "${p.name}" applied to ${days.length} day(s): ${days.join(', ')} ✓`);
}

function clearPresetFromDays(pid){
  const p=PRESETS.find(x=>x.id===pid);if(!p)return;
  const checked=document.querySelectorAll('.dc-chk:checked');
  const days=[...checked].map(c=>parseInt(c.value));
  days.forEach(d=>{
    if(DAY_RATES[d]){
      MATS.forEach(m=>{delete DAY_RATES[d][m.id];});
      if(!Object.keys(DAY_RATES[d]).length)delete DAY_RATES[d];
    }
    p.appliedDays=p.appliedDays.filter(x=>x!==d);
  });
  runSim();buildSet();markUnsaved();
  toast(`Cleared preset from ${days.length} day(s)`);
}

function loadPresetIntoCurrentRates(pid){
  const p=PRESETS.find(x=>x.id===pid);if(!p)return;
  // Load into the current rate inputs for inspection/editing
  MATS.forEach(m=>{
    const el=document.getElementById('sri'+m.id);
    if(el&&p.rates[m.id]!=null)el.value=p.rates[m.id];
  });
  toast(`Preset "${p.name}" loaded into inputs — click Apply to confirm`);
}

function buildPresetCard(){
  const d=SET_DAY;

  // Checkbox grid for day selection
  let daysH='<div class="day-checkboxes">';
  for(let i=1;i<=31;i++){
    const applied=PRESET_EDIT_ID&&PRESETS.find(x=>x.id===PRESET_EDIT_ID)?.appliedDays.includes(i);
    const hasDayRate=DAY_RATES[i]&&Object.keys(DAY_RATES[i]).length>0;
    daysH+=`<div class="dc${hasDayRate?' has-preset':''}">
      <input type="checkbox" class="dc-chk" id="dc${i}" value="${i}" ${applied?'checked':''}>
      <label for="dc${i}" title="Day ${i}">${i}</label>
    </div>`;
  }
  daysH+=`</div><div style="margin-bottom:8px"><span class="apl-select-all" onclick="document.querySelectorAll('.dc-chk').forEach(c=>c.checked=true)">Select all</span> · <span class="apl-clear-sel" onclick="document.querySelectorAll('.dc-chk').forEach(c=>c.checked=false)">Clear</span></div>`;

  // Preset list
  let listH='';
  if(!PRESETS.length){
    listH=`<div style="color:#3a5070;font-size:11px;padding:8px 0">No presets yet. Create your first preset below.</div>`;
  } else {
    PRESETS.forEach(p=>{
      const isEdit=PRESET_EDIT_ID===p.id;
      // Rate chips — show each mat's rate vs default
      const chips=MATS.map(m=>{
        const def=m.rate,val=p.rates[m.id]??m.rate;
        const changed=Math.abs(val-def)>0.0001;
        return `<span class="pi-rate-chip${changed?' changed':''}" title="${m.n}">${m.s||m.n.slice(0,4)}: ${val}</span>`;
      }).join('');
      const appliedStr=p.appliedDays.length?`Applied to: ${p.appliedDays.sort((a,b)=>a-b).join(', ')}`:'Not applied to any day';
      listH+=`<div class="preset-item${isEdit?' active':''}">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px">
            <span class="pi-name" onclick="showApplyPanel('${p.id}')" title="Click to apply to days">${p.name}</span>
            <span class="pi-desc">${appliedStr}</span>
          </div>
          <div class="pi-rates">${chips}</div>
          <div class="${isEdit?'apply-preset-panel show':'apply-preset-panel'}" id="apl-${p.id}">
            <div class="apl-title">Select days to apply "<b>${p.name}</b>":</div>
            ${daysH}
            <div class="apl-btns">

    });
  }

  // Create new preset
  const createH=`<div class="preset-create">
    <input class="preset-name-inp" id="preset-name-inp" type="text" placeholder="Preset name (e.g. Min Feed, Max Production)">

  return `<div class="preset-card">
    <div class="preset-card-hdr">
      📋 Rate Presets
      <span style="font-size:10px;font-weight:400;color:#3a5070">${PRESETS.length} preset(s) · Click preset name to apply to days</span>
    </div>
    <div class="preset-list">${listH}</div>
    ${createH}
  </div>`;
}

// PLANS (up to 4 named snapshots)
// ══════════════════════════════════════════════════
function captureState(){
  // Calculate total logistics cost for this state
  var totalRM=0,totalWS=0;
  RES.forEach(function(r){
    [1,2,3,4].forEach(function(id){var trucks=(r.dpA[id]||0)+(r.dpN[id]||0);totalRM+=trucks*M[id].pv*COST_RM[id];});
    [5,6].forEach(function(id){totalWS+=((r.dpA[id]||0)+(r.dpN[id]||0))*COST_WS_FIXED[id];});
    var ww7=(r.dpA[7]||0)+(r.dpN[7]||0);if(ww7>0)totalWS+=COST_WW_OPTS[COST_WW_SEL].fn(ww7,M[7].pv);
    var cw8=(r.dpA[8]||0)+(r.dpN[8]||0);if(cw8>0)totalWS+=COST_CW_OPTS[COST_CW_SEL].fn(cw8,M[8].pv);
  });
  return{
    INIT:JSON.parse(JSON.stringify(INIT)),
    RATES:JSON.parse(JSON.stringify(RATES)),
    DAY_RATES:JSON.parse(JSON.stringify(DAY_RATES)),
    OVR:JSON.parse(JSON.stringify(OVR)),
    PRESETS:JSON.parse(JSON.stringify(PRESETS)),
    SEL,WK,
    savedAt:new Date().toLocaleString(),
    stats:{
      comply:RES.filter(r=>r.ok).length,
      trucks:RES.reduce((a,r)=>a+MATS.reduce((b,m)=>b+(r.dpA[m.id]||0)+(r.dpN[m.id]||0),0),0),
      rmAlerts:RES.reduce((a,r)=>a+RM_MATS.filter(id=>['crit','upper'].includes(r.sn[id].st)).length,0),
      wsAlerts:RES.reduce((a,r)=>a+WS_MATS.filter(id=>r.sn[id].st==='crit').length,0),
      otDays:RES.filter(r=>r.ot>0).length,
      costRM:Math.round(totalRM),
      costWS:Math.round(totalWS),
      costTotal:Math.round(totalRM+totalWS),
      wwOpt:COST_WW_SEL,
      cwOpt:COST_CW_SEL,
    }
  };
}

function restoreState(snap){
  Object.assign(INIT,snap.INIT);
  Object.assign(RATES,snap.RATES);
  Object.keys(DAY_RATES).forEach(k=>delete DAY_RATES[k]);
  Object.assign(DAY_RATES,snap.DAY_RATES);
  Object.keys(OVR).forEach(k=>delete OVR[k]);
  Object.assign(OVR,snap.OVR);
  PRESETS.splice(0,PRESETS.length,...(snap.PRESETS||[]));
  if(snap.SEL)SEL=snap.SEL;
  if(snap.WK!=null)WK=snap.WK;
}

function saveToPlan(idx,nameOverride){
  const snap=captureState();
  const existingName=PLANS[idx]?PLANS[idx].name:null;
  const name=nameOverride||existingName||`Plan ${idx+1}`;
  snap.name=name;
  PLANS[idx]=snap;
  ACTIVE_PLAN=idx;
  updateActivePlanChip();markUnsaved();buildHome();
  toast(`Saved "${name}" ✓`);
}

function addNewPlan(){
  const name=prompt(`Name for Plan ${PLANS.length+1}:`,`Plan ${PLANS.length+1}`);
  if(!name||!name.trim())return;
  const snap=captureState();snap.name=name.trim();
  PLANS.push(snap);ACTIVE_PLAN=PLANS.length-1;
  updateActivePlanChip();markUnsaved();buildHome();
  toast(`Saved as "${snap.name}" ✓`);
}

function loadFromPlan(idx){
  const p=PLANS[idx];if(!p)return;
  if(!confirm(`Load "${p.name}"? Current unsaved changes will be lost.`))return;
  restoreState(p);ACTIVE_PLAN=idx;runSim();updateActivePlanChip();buildHome();
  toast(`Loaded "${p.name}" ✓`);
}

function deletePlan(idx){
  const p=PLANS[idx];if(!p)return;
  if(!confirm(`Delete "${p.name}"?`))return;
  PLANS.splice(idx,1);
  if(ACTIVE_PLAN===idx)ACTIVE_PLAN=-1;
  else if(ACTIVE_PLAN>idx)ACTIVE_PLAN--;
  updateActivePlanChip();markUnsaved();buildHome();toast('Plan deleted');
}

function duplicatePlan(idx){
  const p=PLANS[idx];if(!p)return;
  const snap=JSON.parse(JSON.stringify(p));
  snap.name=p.name+' (copy)';snap.savedAt=new Date().toLocaleString();
  PLANS.push(snap);markUnsaved();buildHome();toast(`Duplicated as "${snap.name}" ✓`);
}

function renamePlan(idx){
  const p=PLANS[idx];if(!p)return;
  const name=prompt('New name:',p.name);
  if(name&&name.trim()){PLANS[idx].name=name.trim();markUnsaved();buildHome();}
}

function updateActivePlanChip(){
  const chip=document.getElementById('active-plan-chip');
  const nameEl=document.getElementById('active-plan-name');
  if(!chip||!nameEl)return;
  if(ACTIVE_PLAN>=0&&PLANS[ACTIVE_PLAN]){
    chip.style.display='block';
    nameEl.textContent=PLANS[ACTIVE_PLAN].name;
  }else{
    chip.style.display='none';
  }
}

  // Material summary

    const minP=Math.min(...daySnaps.map(s=>s.p)).toFixed(1);
    const maxP=Math.max(...daySnaps.map(s=>s.p)).toFixed(1);
    const alerts=daySnaps.filter(s=>['crit','upper'].includes(s.st)).length;
    const col=m.t==='RM'?'#4f9eff':'#a371f7';
    const pctW=Math.min(100,parseFloat(avgP));
    H+=`<div class="msc ${m.t.toLowerCase()}">
      <div class="msc-hdr">
        <div class="msc-name">${m.n}</div>
        <span class="msc-type ${m.t==='RM'?'msc-rm':'msc-ws'}">${m.t}-${m.a}</span>
      </div>
      <div class="msc-row"><span style="color:#3a5070">Avg</span><span class="msc-val">${avgP}%</span></div>
      <div class="msc-row"><span style="color:#3a5070">Range</span><span class="msc-val">${minP}–${maxP}%</span></div>
      <div class="msc-row"><span style="color:#3a5070">Alerts</span><span class="msc-val" style="color:${alerts?'#f47067':'#56d364'}">${alerts} days</span></div>
      <div class="msc-row"><span style="color:#3a5070">Rate/Day</span><span class="msc-val">${RATES[m.id]} ${m.t==='RM'?'T':'m³'}</span></div>
      <div class="msc-row"><span style="color:#3a5070;display:flex;align-items:center;gap:3px">⏱ Rate/Hr</span><span class="msc-val" style="color:#58a6ff">${(RATES[m.id]/24).toFixed(4)} ${m.t==='RM'?'T':'m³'}</span></div>
      <div class="msc-pct"><div class="msc-pct-fill" style="width:${pctW}%;background:${col}"></div></div>
    </div>`;
  });
  H+=`</div>`;

  // Plans section
  H+=`<div class="plans-section">
    <div class="plans-hdr">
      <div>
        <div class="plans-hdr-title">📋 Saved Plans <span style="font-size:11px;color:#3a5070;font-weight:400">(${PLANS.length} saved)</span></div>
        <div class="plans-hdr-sub">Save unlimited plans · Compare side by side with logistics cost</div>
      </div>
      <button onclick="addNewPlan()" style="padding:7px 16px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid #14422a;background:#0a2e1c;color:#3fb950;white-space:nowrap;flex-shrink:0;transition:all .15s" onmouseover="this.style.background='#0f3d22'" onmouseout="this.style.background='#0a2e1c'">＋ Save New Plan</button>
    </div>
    <div class="plans-grid">`;

  PLANS.forEach((p,i)=>{
    const isActive=ACTIVE_PLAN===i;
    // Ensure cost stats exist (recalculate if missing)
    if(p.stats.costTotal==null){
      let rm=0,ws=0;
      RES.forEach(r=>{
        [1,2,3,4].forEach(id=>{rm+=((r.dpA[id]||0)+(r.dpN[id]||0))*M[id].pv*COST_RM[id];});
        [5,6].forEach(id=>{ws+=((r.dpA[id]||0)+(r.dpN[id]||0))*COST_WS_FIXED[id];});
        const ww7=(r.dpA[7]||0)+(r.dpN[7]||0);if(ww7>0)ws+=COST_WW_OPTS[COST_WW_SEL].fn(ww7,M[7].pv);
        const cw8=(r.dpA[8]||0)+(r.dpN[8]||0);if(cw8>0)ws+=COST_CW_OPTS[COST_CW_SEL].fn(cw8,M[8].pv);
      });
      p.stats.costRM=Math.round(rm);p.stats.costWS=Math.round(ws);p.stats.costTotal=Math.round(rm+ws);
    }
    const costStr=p.stats.costTotal?fmtBahtFull(p.stats.costTotal):'—';
    H+=`<div class="plan-card${isActive?' active-plan':''}">
      ${isActive?'<div class="pc-badge pc-active-badge">● Active</div>':''}
      <div class="pc-num">Plan ${i+1}</div>
      <div class="pc-name">${p.name}</div>
      <div class="pc-meta">
        On-Time: <b style="color:${p.stats.comply===31?'#56d364':'#fcd34d'}">${p.stats.comply}/31</b><br>
        Trucks: <b style="color:#79c0ff">${p.stats.trucks}</b><br>
        RM <b style="color:${p.stats.rmAlerts?'#f47067':'#56d364'}">${p.stats.rmAlerts}</b> · WS <b style="color:${p.stats.wsAlerts?'#f47067':'#56d364'}">${p.stats.wsAlerts}</b> alerts<br>
        <span style="color:#e3b341;font-weight:700">💰 ${costStr}</span>
      </div>
      <div class="pc-date">Saved: ${p.savedAt||'—'}</div>

        ${!isActive?`<button class="pc-btn pc-load" onclick="loadFromPlan(${i})">▶ Load</button>`:'<span style="font-size:10px;color:#3a5070">Active</span>'}

        <button class="pc-btn pc-rename" onclick="renamePlan(${i})" title="Rename">✏</button>
        <button class="pc-btn" onclick="duplicatePlan(${i})" title="Duplicate" style="background:#161b22;color:#8b949e;border:1px solid #30363d;border-radius:4px;padding:3px 7px;font-size:10px;cursor:pointer">⎘</button>

  // Comparison table — if 2+ plans
  if(PLANS.length>=2){

    // Recalculate cost for any plan missing cost stats (saved before cost feature)
    PLANS.forEach(p=>{
      if(p&&(p.stats.costTotal==null)){
        let rm=0,ws=0;
        // We need RES for that plan — approximate from saved RATES + OVR
        // Use current RES but with the plan's saved truck counts (from OVR)
        RES.forEach(r=>{
          [1,2,3,4].forEach(id=>{
            const trucks=(r.dpA[id]||0)+(r.dpN[id]||0);
            rm+=trucks*M[id].pv*COST_RM[id];
          });
          [5,6].forEach(id=>{ws+=((r.dpA[id]||0)+(r.dpN[id]||0))*COST_WS_FIXED[id];});

          const opt7=p.stats.wwOpt||COST_WW_SEL;
          if(ww7>0)ws+=COST_WW_OPTS[opt7].fn(ww7,M[7].pv);
          const cw8=(r.dpA[8]||0)+(r.dpN[8]||0);
          const opt8=p.stats.cwOpt||COST_CW_SEL;
          if(cw8>0)ws+=COST_CW_OPTS[opt8].fn(cw8,M[8].pv);
        });
        p.stats.costRM=Math.round(rm);
        p.stats.costWS=Math.round(ws);
        p.stats.costTotal=Math.round(rm+ws);
      }
    });
    const metrics=[
      {key:'comply',  label:'On-Time',    sect:null,  fmt:v=>`${v}/31`, best:'max'},
      {key:'trucks',  label:'Trucks',     sect:null,  fmt:v=>v,         best:'min'},
      {key:'rmAlerts',label:'RM Alerts',  sect:null,  fmt:v=>v,         best:'min'},
      {key:'wsAlerts',label:'WS Alerts',  sect:null,  fmt:v=>v,         best:'min'},
      {key:'otDays',  label:'Overtime',   sect:null,  fmt:v=>`${v}d`,   best:'min'},
      {sect:'LOGISTICS COST'},
      {key:'costRM',  label:'Inbound RM', sect:null,  fmt:v=>v?fmtBaht(v):'—', best:'min', cost:true},
      {key:'costWS',  label:'Outbound WS',sect:null,  fmt:v=>v?fmtBaht(v):'—', best:'min', cost:true},
      {key:'costTotal',label:'Total Cost', sect:null,  fmt:v=>v?fmtBaht(v):'—', best:'min', cost:true},
    ];

    metrics.forEach(met=>{
      if(met.sect){
        H+=`<div class="cg-sect" style="grid-column:1/-1">${met.sect}</div>`;
        return;
      }
      const vals=PLANS.map(p=>p.stats[met.key]??null);
      const nums=vals.filter(v=>v!=null&&v!==undefined);
      const best=met.best==='max'?Math.max(...nums):Math.min(...nums);
      const worst=met.best==='max'?Math.min(...nums):Math.max(...nums);
      H+=`<div class="cg-cell cg-label">${met.label}</div>`;
      vals.forEach(v=>{
        if(v==null){H+=`<div class="cg-cell" style="color:#21262d">—</div>`;return;}
        const isBest=v===best&&nums.length>1;
        const isWorst=v===worst&&nums.length>1&&best!==worst;
        const cls=isBest?'cg-best':isWorst?'cg-worst':met.cost?'cg-cost':'';
        H+=`<div class="cg-cell ${cls}">${met.fmt(v)}</div>`;
      });
    });
    H+=`</div></div>`;
  }

  H+=`</div>`;// close plans-section
  el.innerHTML=H;
}

function grvApplyDisplayToCharts(){

      if(ds.label==='Stock %')      ds.hidden=!GRV_SHOW.stock;

function grvHourlyStock(mid,dayIdx){
  // Use end-of-previous-day stock from RES as opening stock (consistent with hourly runSim)
  var m=M[mid];
  var stk=dayIdx===1
    ? (parseFloat(INIT[mid])||0)
    : (RES[dayIdx-2]?RES[dayIdx-2].sn[mid].v : (parseFloat(INIT[mid])||0));
  var rday=RES[dayIdx-1];
  var rate=(DAY_RATES[dayIdx]&&DAY_RATES[dayIdx][mid]!=null)?DAY_RATES[dayIdx][mid]:RATES[mid];
  var rphDefault=rate/24;
  var tA=rday?rday.dpA[mid]||0:0, tN=rday?rday.dpN[mid]||0:0;
  var amEndH=tA>0?Math.min(23,Math.floor(7+tA*m.lm/60)):null;
  var pmEndH=tN>0?Math.min(23,Math.floor(13+tN*m.lm/60)):null;
  var hourly=[];
  for(var hr=0;hr<=23;hr++){
    var hrRate=(HOUR_RATES[dayIdx]&&HOUR_RATES[dayIdx][mid]&&HOUR_RATES[dayIdx][mid][hr]!=null)
      ?HOUR_RATES[dayIdx][mid][hr]:rphDefault;
    if(m.t==='RM') stk=Math.max(0,stk-hrRate);
    else           stk=Math.min(m.cap,stk+hrRate);
    if(amEndH!==null&&hr===amEndH){
      if(m.t==='WS') stk=Math.max(0,stk-tA*m.pv);
      else           stk=Math.min(m.cap,stk+tA*m.pv);
    }
    if(pmEndH!==null&&hr===pmEndH&&pmEndH!==amEndH){
      if(m.t==='WS') stk=Math.max(0,stk-tN*m.pv);
      else           stk=Math.min(m.cap,stk+tN*m.pv);
    }
    hourly.push(+(stk/m.cap*100).toFixed(2));
  }
  return hourly;
}

// ===== MULTI-DAY TIMELINE =====
function grvBuildFullTimeline(mid){
  var m=M[mid];var pts=[];var stk=parseFloat(INIT[mid])||0;
  for(var d=1;d<=DAYS;d++){
    var r=RES[d-1];
    var rDay=(DAY_RATES[d]&&DAY_RATES[d][mid]!=null)?DAY_RATES[d][mid]:RATES[mid];
    var tA=r?r.dpA[mid]||0:0,tN=r?r.dpN[mid]||0:0;
    var amH=tA>0?Math.min(23,Math.floor(7+tA*m.lm/60)):null;
    var pmH=tN>0?Math.min(23,Math.floor(13+tN*m.lm/60)):null;
    for(var h=0;h<24;h++){
      var hrR=(HOUR_RATES[d]&&HOUR_RATES[d][mid]&&HOUR_RATES[d][mid][h]!=null)?HOUR_RATES[d][mid][h]:rDay/24;
      if(m.t==='RM')stk=Math.max(0,stk-hrR);else stk=Math.min(m.cap,stk+hrR);
      if(amH!==null&&h===amH){if(m.t==='WS')stk=Math.max(0,stk-tA*m.pv);else stk=Math.min(m.cap*.75,stk+tA*m.pv);}
      if(pmH!==null&&h===pmH&&pmH!==amH){if(m.t==='WS')stk=Math.max(0,stk-tN*m.pv);else stk=Math.min(m.cap*.75,stk+tN*m.pv);}
      pts.push({lbl:(h===0?'D'+d:(h%6===0?padH(h):'')),full:'D'+d+' '+padH(h)+':00',stock:+(stk/m.cap*100).toFixed(2),rate:hrR,day:d,hour:h,isDay:(h===0)});
    }
  }
  return pts;
}

// ── RUNWAY CALCULATION ──────────────────────────────
// Returns how many days/hours the plant can run at current rate with no new trucks
function calcRunway(mid, forDay){
  var m=M[mid];
  if(!m||!RES)return null;
  var dayIdx=Math.min(forDay||GRV_DAY, RES.length)-1;
  var r=RES[dayIdx];if(!r)return null;
  var sn=r.sn[mid];
  var stockVol=sn.v; // current volume (T or m³)
  var rateDay=RATES[mid]; // T/day or m³/day (global, no override for "no trucks" scenario)
  if(rateDay<=0)return {days:Infinity,hours:Infinity,stockVol:stockVol,rateDay:rateDay,cls:'great',label:'∞'};
  var days, hours;
  if(m.t==='RM'){
    // Days until empty
    days=stockVol/rateDay;
  } else {
    // Days until full
    var remaining=m.cap-stockVol;
    days=remaining/rateDay;
  }
  hours=days*24;
  var cls=days<1?'crit':days<3?'warn':days<7?'ok':'great';
  var label=days>=99?'99+d':days>=1?(days.toFixed(1)+'d'):(hours.toFixed(1)+'h');
  return {days:days,hours:hours,stockVol:stockVol,rateDay:rateDay,cls:cls,label:label,m:m};
}

function grvSetMode(m){GRV_MODE=m;buildGraphs();}

    +'<div class="grv-sep"></div>'
    +'<button class="gvb" onclick="grvToggleDisplayPanel()" id="grv-dp-btn" style="background:#0d1828;border-color:#2a3a52;color:#79c0ff">🎛 Display ▾</button>'
    +(GRV_MODE==='day'
      ?'<div class="grv-sep"></div><span style="font-size:10px;color:#3a5070">Day:</span>'
        +'<select id="grv-day-sel" onchange="grvSetDay(parseInt(this.value))" style="background:#0d1117;color:#93c5fd;border:1px solid #21262d;border-radius:4px;padding:3px 6px;font-size:11px;font-family:monospace;cursor:pointer;outline:none">'
        +(function(){var o='';for(var i=1;i<=31;i++){var rv=RES[i-1];o+='<option value="'+i+'"'+(i===GRV_DAY?' selected':'')+'>';o+='Day '+i+(rv?' ('+rv.dow.slice(0,3)+')':'')+'</option>';}return o;})()
        +'</select>'

  // Build display config panel
  grvBuildDisplayPanel();

  /* mode bar — hidden, merged into toolbar */
  var mb2=document.getElementById('grv-modebar');
  if(mb2)mb2.innerHTML='';

  /* material bar */
  var mb=document.getElementById('grv-matbar');
  if(mb){
    var mh='<button class="gvm gvm-all'+(GRV_SEL.length===0?' on':'')+'" onclick="grvAll()">All</button><div class="grv-mat-div"></div>';
    MATS.filter(function(m){return m.t==='RM';}).forEach(function(m){
      var on=GRV_SEL.indexOf(m.id)>=0;
      mh+='<button class="gvm'+(on?' sel':'')+'" style="--mc:'+GRC[m.id]+'" onclick="grvToggle('+m.id+')" title="'+m.n+'">'
        +'<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:'+GRC[m.id]+';margin-right:4px;vertical-align:middle"></span>'+m.s+'</button>';
    });
    mh+='<div class="grv-mat-div"></div>';
    MATS.filter(function(m){return m.t==='WS';}).forEach(function(m){
      var on=GRV_SEL.indexOf(m.id)>=0;
      mh+='<button class="gvm'+(on?' sel':'')+'" style="--mc:'+GRC[m.id]+'" onclick="grvToggle('+m.id+')" title="'+m.n+'">'
        +'<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:'+GRC[m.id]+';margin-right:4px;vertical-align:middle"></span>'+m.s+'</button>';
    });
    mb.innerHTML=mh;
  }

  /* area: arrows + track */
  var area=document.getElementById('grv-area');
  if(!area)return;
  area.innerHTML='<button class="grv-arr grv-arr-l" id="grv-arr-l" onclick="grvNav(-1)">&#8249;</button>'

    +'<button class="grv-arr grv-arr-r" id="grv-arr-r" onclick="grvNav(1)">&#8250;</button>';
  var track=document.getElementById('grv-track');

  /* footer dots */
  var footer=document.getElementById('grv-footer');
  if(footer){
    var fh='';
    GRV_IDS.forEach(function(id,i){
      fh+='<div class="grv-dot'+(i===GRV_IDX?' on':'')+'" style="background:'+(i===GRV_IDX?(GRC[id]||'#58a6ff'):'#21262d')+';'+(i===GRV_IDX?'width:22px;border-radius:4px':'')+'" onclick="grvGoTo('+i+')" title="'+((MATS.find(function(m){return m.id===id;})||{}).n||'Mat '+id)+'"></div>';
    });
    fh+='<span class="grv-ctr" id="grv-ctr">1 / '+GRV_IDS.length+'</span>';
    footer.innerHTML=fh;
  }

  if(typeof Chart==='undefined'){var e=document.createElement('div');e.style='color:#f47067;padding:20px;font-family:monospace';e.textContent='Chart.js not loaded.';track.appendChild(e);return;}
  Chart.defaults.color='#6a8099';Chart.defaults.borderColor='rgba(255,255,255,0.04)';

  var pending=[];

  /* ══════════════════════════════════════════════
     BUILD SLIDES — branch by GRV_MODE
  ══════════════════════════════════════════════ */

      var H=
        // ── Header ──
        '<div class="gs-head">'

        +'<div class="gs-meta">'+m.t+' · '+m.dk+' · Cap '+m.cap+(m.t==='RM'?' T':' m³')+'</div></div>'
        +'<div class="gs-badges">'

        +(m.t==='RM'?'<span class="gbg" style="background:#0d1f3a;color:#79c0ff;border-color:#1d3a6a">Target 50–75%</span>'

        +'</div></div>'

        // ── KPI strip ──
        +'<div class="gs-kpi-strip">'
        +(GRV_SHOW.kpiAvg?'<div class="gs-kpi '+(avgStk<50&&m.t==='RM'?'warn':avgStk>20&&m.t==='WS'?'warn':'ok')+'"><span class="gs-kv">'+avgStk.toFixed(1)+'%</span><span class="gs-kl">Avg Stock</span></div>':'')
        +(GRV_SHOW.kpiMin?'<div class="gs-kpi '+(minStk<50&&m.t==='RM'?'crit':minStk>20&&m.t==='WS'?'crit':'ok')+'"><span class="gs-kv">'+minStk.toFixed(1)+'%</span><span class="gs-kl">Min</span></div>':'')
        +(GRV_SHOW.kpiMax?'<div class="gs-kpi '+(maxStk>75&&m.t==='RM'?'upper':maxStk>20&&m.t==='WS'?'crit':'ok')+'"><span class="gs-kv">'+maxStk.toFixed(1)+'%</span><span class="gs-kl">Max</span></div>':'')
        +(GRV_SHOW.kpiCrit?'<div class="gs-kpi '+(alertDays>5?'crit':alertDays>0?'warn':'ok')+'"><span class="gs-kv">'+alertDays+'</span><span class="gs-kl">Critical Days</span></div>':'')
        +(GRV_SHOW.kpiWatch?'<div class="gs-kpi '+(warnDays>3?'warn':'ok')+'"><span class="gs-kv">'+warnDays+'</span><span class="gs-kl">Watch Days</span></div>':'')

        +(function(){

        +'<span class="gs-sect-title">📋 31-Day Breakdown</span>'
        +(alertDays?'<span class="gs-sect-badge '+(alertDays>5?'crit':'warn')+'">'+alertDays+' alerts</span>':'')
        +'<span class="gs-sect-arrow">›</span></div>'
        +'<div class="gs-sect-body">'
        +'<table class="gs-tbl"><thead><tr>'
        +'<th>Day</th><th>DOW</th><th class="r">Stock%</th><th>Bar</th><th class="r">Vol</th>'

      RES.forEach(function(r){

    } else {
      /* ── HOURLY DAY SLIDE — clean layout ── */

      var tA_h=rday?rday.dpA[mid]||0:0,tN_h=rday?rday.dpN[mid]||0:0;
      var amEH=tA_h>0?Math.floor(7+tA_h*m.lm/60):null;
      var pmEH=tN_h>0?Math.floor(13+tN_h*m.lm/60):null;

    var sx=0;
    trk.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;},{passive:true});
    trk.addEventListener('touchend',function(e){var dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>40)grvNav(dx<0?1:-1);},{passive:true});
    trk.addEventListener('scroll',function(){var i=Math.round(trk.scrollLeft/(trk.clientWidth||1));if(i!==GRV_IDX){GRV_IDX=i;grvSync();}},{passive:true});
  }
}


// ══════════════════════════════════════════════════
// HOURLY RATE OVERRIDES
// ══════════════════════════════════════════════════
function setHourRate(mid){
  var day=GRV_DAY;
  var hSel=document.getElementById('gadj-hsel-'+mid);
  var hInp=document.getElementById('gadj-hinp-'+mid);
  if(!hSel||!hInp)return;
  var hr=parseInt(hSel.value);
  var val=parseFloat(hInp.value);
  if(isNaN(val)||val<0){toast('Enter a valid T/hr value');return;}
  if(!HOUR_RATES[day])HOUR_RATES[day]={};
  if(!HOUR_RATES[day][mid])HOUR_RATES[day][mid]={};
  HOUR_RATES[day][mid][hr]=val;
  runSim();buildGraphs();markUnsaved();
  toast('Day '+day+' '+padH(hr)+':00 · '+M[mid].n+' → '+val.toFixed(4)+' T/hr ✓');
}

function clearHourRate(mid,hr){
  var day=GRV_DAY;
  if(HOUR_RATES[day]&&HOUR_RATES[day][mid]&&HOUR_RATES[day][mid][hr]!=null){
    delete HOUR_RATES[day][mid][hr];
    if(!Object.keys(HOUR_RATES[day][mid]).length)delete HOUR_RATES[day][mid];
    if(!Object.keys(HOUR_RATES[day]).length)delete HOUR_RATES[day];
  }
  runSim();buildGraphs();markUnsaved();
  toast('Cleared Day '+day+' '+padH(hr)+':00 override');
}

function clearAllHourRates(mid){
  // Clear all hour overrides for this material across ALL days
  Object.keys(HOUR_RATES).forEach(function(d){
    if(HOUR_RATES[d][mid]){
      delete HOUR_RATES[d][mid];
      if(!Object.keys(HOUR_RATES[d]).length)delete HOUR_RATES[d];
    }
  });
  runSim();buildGraphs();markUnsaved();
  toast('Cleared ALL hour overrides for '+M[mid].n);
}

// ──────────────────────────────────────────────
// RANGE OVERRIDE: Day A Hour X  →  Day B Hour Y
// ──────────────────────────────────────────────
function setRangeRate(mid){
  var fDay=parseInt(document.getElementById('gadj-rfday-'+mid).value);
  var fHr =parseInt(document.getElementById('gadj-rfhr-'+mid).value);
  var tDay=parseInt(document.getElementById('gadj-rtday-'+mid).value);
  var tHr =parseInt(document.getElementById('gadj-rthr-'+mid).value);
  var val =parseFloat(document.getElementById('gadj-rrate-'+mid).value);
  if(isNaN(val)||val<0){toast('Enter a valid T/hr rate');return;}
  if(fDay>tDay||(fDay===tDay&&fHr>tHr)){toast('Start must be before End');return;}
  var count=0;
  for(var d=fDay;d<=tDay;d++){
    if(!HOUR_RATES[d])HOUR_RATES[d]={};
    if(!HOUR_RATES[d][mid])HOUR_RATES[d][mid]={};
    var h0=(d===fDay)?fHr:0;
    var h1=(d===tDay)?tHr:23;
    for(var h=h0;h<=h1;h++){HOUR_RATES[d][mid][h]=val;count++;}
  }
  runSim();buildGraphs();markUnsaved();
  toast(M[mid].n+': '+val.toFixed(4)+' T/hr · D'+fDay+' '+padH(fHr)+':00 → D'+tDay+' '+padH(tHr)+':00 ('+count+'hrs) ✓');
}

function clearRangeRate(mid){
  var fDay=parseInt(document.getElementById('gadj-rfday-'+mid).value);
  var fHr =parseInt(document.getElementById('gadj-rfhr-'+mid).value);
  var tDay=parseInt(document.getElementById('gadj-rtday-'+mid).value);
  var tHr =parseInt(document.getElementById('gadj-rthr-'+mid).value);
  if(fDay>tDay||(fDay===tDay&&fHr>tHr)){toast('Start must be before End');return;}
  for(var d=fDay;d<=tDay;d++){
    if(!HOUR_RATES[d]||!HOUR_RATES[d][mid])continue;
    var h0=(d===fDay)?fHr:0;
    var h1=(d===tDay)?tHr:23;
    for(var h=h0;h<=h1;h++){delete HOUR_RATES[d][mid][h];}
    if(!Object.keys(HOUR_RATES[d][mid]).length)delete HOUR_RATES[d][mid];
    if(!Object.keys(HOUR_RATES[d]).length)delete HOUR_RATES[d];
  }
  runSim();buildGraphs();markUnsaved();
  toast('Cleared range D'+fDay+' '+padH(fHr)+':00 → D'+tDay+' '+padH(tHr)+':00');
}

function clearOneRange(mid,fDay,fHr,tDay,tHr){
  for(var d=fDay;d<=tDay;d++){
    if(!HOUR_RATES[d]||!HOUR_RATES[d][mid])continue;
    var h0=(d===fDay)?fHr:0;
    var h1=(d===tDay)?tHr:23;
    for(var h=h0;h<=h1;h++){delete HOUR_RATES[d][mid][h];}
    if(!Object.keys(HOUR_RATES[d][mid]).length)delete HOUR_RATES[d][mid];
    if(!Object.keys(HOUR_RATES[d]).length)delete HOUR_RATES[d];
  }
  runSim();buildGraphs();markUnsaved();
  toast('Range cleared ✓');
}

function clearHourDayRate(mid,day){
  if(HOUR_RATES[day]&&HOUR_RATES[day][mid]){
    delete HOUR_RATES[day][mid];
    if(!Object.keys(HOUR_RATES[day]).length)delete HOUR_RATES[day];
  }
  runSim();buildGraphs();markUnsaved();
  toast('Cleared all Day '+day+' overrides for '+M[mid].n);
}

// Compress per-hour overrides for one material into contiguous ranges
function compressRanges(mid){
  // Collect all (day,hour,rate) sorted
  var pts=[];
  for(var d=1;d<=DAYS;d++){
    if(!HOUR_RATES[d]||!HOUR_RATES[d][mid])continue;
    Object.keys(HOUR_RATES[d][mid]).forEach(function(h){
      pts.push({d:d,h:+h,r:HOUR_RATES[d][mid][h]});
    });
  }
  pts.sort(function(a,b){return a.d!==b.d?a.d-b.d:a.h-b.h;});
  if(!pts.length)return[];
  var ranges=[];
  var cur=null;
  pts.forEach(function(p,i){
    var prev=pts[i-1];
    var consecutive=prev&&(
      (p.d===prev.d&&p.h===prev.h+1)||
      (p.d===prev.d+1&&prev.h===23&&p.h===0)
    );
    if(!cur||!consecutive||p.r!==cur.rate){
      if(cur)ranges.push(cur);
      cur={fDay:p.d,fHr:p.h,tDay:p.d,tHr:p.h,rate:p.r,count:1};
    } else {
      cur.tDay=p.d;cur.tHr=p.h;cur.count++;
    }
  });
  if(cur)ranges.push(cur);
  return ranges;
}

function buildRangeSummary(mid){
  var ranges=compressRanges(mid);
  if(!ranges.length)return '<div style="font-size:9px;color:#2a4060;padding:4px 0">No range overrides set for this material.</div>';
  var H='<div class="rng-sum-title">Active overrides — '+ranges.length+' range(s) across all days:</div>';
  ranges.forEach(function(rng){
    var isSame=rng.fDay===rng.tDay&&rng.fHr===rng.tHr;
    var span=isSame
      ?('D'+rng.fDay+' '+padH(rng.fHr)+':00')
      :('D'+rng.fDay+' '+padH(rng.fHr)+':00 → D'+rng.tDay+' '+padH(rng.tHr)+':00');
    var rDay=(DAY_RATES[rng.fDay]&&DAY_RATES[rng.fDay][mid]!=null)?DAY_RATES[rng.fDay][mid]:RATES[mid];
    var def=rDay/24;
    var pct=def>0?Math.round((rng.rate/def-1)*100):0;
    var pctStr=(pct>=0?'+':'')+pct+'%';
    H+='<div class="rng-entry">'
      +'<span class="rng-entry-span">'+span+'</span>'
      +'<span class="rng-entry-rate">'+rng.rate.toFixed(4)+' T/hr</span>'
      +'<span style="font-size:9px;color:'+(pct>0?'#f0883e':pct<0?'#56d364':'#6a8099')+'">'+pctStr+'</span>'
      +'<span class="rng-entry-days">'+rng.count+'hr</span>'
      +'<span class="rng-entry-x" onclick="clearOneRange('+mid+','+rng.fDay+','+rng.fHr+','+rng.tDay+','+rng.tHr+')">×</span>'
      +'</div>';
  });
  return H;
}

function padH(h){return String(h).padStart(2,'0');}

function buildHourAdjPanel(mid,day){
  var m=M[mid];
  var rDay=(DAY_RATES[day]&&DAY_RATES[day][mid]!=null)?DAY_RATES[day][mid]:RATES[mid];
  var rphDefault=rDay/24;
  var hourOvrs=HOUR_RATES[day]&&HOUR_RATES[day][mid]?HOUR_RATES[day][mid]:{};
  var hasOvrs=Object.keys(hourOvrs).length>0;
  var totalOvrs=compressRanges(mid).reduce(function(a,r){return a+r.count;},0);
  var col=GRC[mid]||'#58a6ff';

  // ── Heat strip (24 cells for current day) ──
  var heatH='<div style="font-size:9px;color:#3a5070;margin-bottom:4px;font-weight:600">Day '+day+' hourly view (click bar to select hour):</div><div class="hr-heat-row">';
  for(var h=0;h<24;h++){
    var r=(hourOvrs[h]!=null)?hourOvrs[h]:rphDefault;
    var ratio=rphDefault>0?r/rphDefault:1;
    var barH=Math.max(4,Math.min(28,Math.round(ratio*14)))+'px';
    var isOvr=hourOvrs[h]!=null;
    var bg=isOvr?(m.t==='RM'?'#f0883e':'#a371f7'):col+'44';
    var bdr=isOvr?'1px solid '+(m.t==='RM'?'#b85000':'#6a30b0'):'1px solid transparent';
    heatH+='<div class="hr-heat-cell" style="height:'+barH+';background:'+bg+';border:'+bdr+'"'
      +' onclick="document.getElementById(\'gadj-hsel-'+mid+'\').value='+h
      +';document.getElementById(\'gadj-hinp-'+mid+'\').value=\''+(isOvr?(hourOvrs[h]).toFixed(4):rphDefault.toFixed(4))+'\'"'
      +' title="'+padH(h)+':00 · '+(isOvr?'Override: '+hourOvrs[h].toFixed(4)+' T/hr':'Default: '+rphDefault.toFixed(4)+' T/hr')+'"></div>';
  }
  heatH+='</div><div class="hr-heat-lbl"><span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>23:00</span></div>';

  // ── Single-hour set (current day) ──
  var singleH='<div class="hr-adj-row" style="margin-top:8px">'
    +'<select class="hr-sel" id="gadj-hsel-'+mid+'">'
      +(function(){var o='';for(var h=0;h<24;h++){
        var isOvr=hourOvrs[h]!=null;
        o+='<option value="'+h+'"'+(isOvr?' style="color:#f0883e"':'')+'>'
          +padH(h)+':00'+(isOvr?' ✎':'')+'</option>';
      }return o;})()
    +'</select>'
    +'<input class="hr-inp" type="number" id="gadj-hinp-'+mid+'" min="0" step="0.0001" value="'+rphDefault.toFixed(4)+'" placeholder="T/hr">'
    +'<span class="hr-unit">T/hr</span>'
    +'<button class="hr-btn hr-btn-set" onclick="setHourRate('+mid+')">✓ Set Hour</button>'
    +(hasOvrs?'<button class="hr-btn hr-btn-clrall" onclick="clearHourDayRate('+mid+','+day+')" style="margin-left:2px">✕ Day</button>':'')
    +'</div>';

  // ── Single-day chips ──
  var chipsH='';
  if(hasOvrs){
    chipsH='<div class="hr-ovr-list">';
    Object.keys(hourOvrs).sort(function(a,b){return+a-+b;}).forEach(function(h){
      var v=hourOvrs[h];
      var pct=rphDefault>0?Math.round((v/rphDefault-1)*100):0;
      var pctStr=(pct>=0?'+':'')+pct+'%';
      chipsH+='<span class="hr-chip changed" title="Click × to remove">'
        +padH(h)+':00 · '+v.toFixed(4)
        +'<span style="font-size:9px;color:#a87040;margin-left:2px">('+pctStr+')</span>'
        +' <span class="hr-chip-x" onclick="clearHourRate('+mid+','+h+')">×</span></span>';
    });
    chipsH+='</div>';
  }

  // ── Range section (across days) ──
  var dayOpts=(function(){
    var o='';for(var d=1;d<=DAYS;d++){
      var rv=RES[d-1];o+='<option value="'+d+'"'+(d===day?' selected':'')+'>D'+d+(rv?' '+rv.dow.slice(0,2):'')+'</option>';
    }return o;
  })();
  var hrOpts=(function(){
    var o='';for(var h=0;h<24;h++){o+='<option value="'+h+'">'+padH(h)+':00</option>';}return o;
  })();
  var hrOptsTo=(function(){
    var o='';for(var h=0;h<24;h++){o+='<option value="'+h+'"'+(h===23?' selected':'')+'>'+padH(h)+':00</option>';}return o;
  })();

  var rangeH='<div class="hr-range">'
    +'<div class="hr-range-title">📅 Range Override'+(totalOvrs>0?' <span style="color:#e6b84a;font-size:9px">('+totalOvrs+' hrs set)</span>':'')+'</div>'
    +'<div class="hr-range-row">'
      +'<span class="hr-range-lbl">From</span>'
      +'<select class="rng-sel" id="gadj-rfday-'+mid+'">'+dayOpts+'</select>'
      +'<select class="rng-sel" id="gadj-rfhr-'+mid+'">'
        +(function(){var o='';for(var h=0;h<24;h++){o+='<option value="'+h+'"'+(h===17?' selected':'')+'>'+padH(h)+':00</option>';}return o;})()
      +'</select>'

      +'</select>'
      +'<select class="rng-sel" id="gadj-rthr-'+mid+'">'

      +'</select>'
    +'</div>'
    +'<div class="hr-range-row">'
      +'<span class="hr-range-lbl">Rate</span>'
      +'<input class="rng-inp" type="number" id="gadj-rrate-'+mid+'" min="0" step="0.0001" value="'+rphDefault.toFixed(4)+'" placeholder="T/hr">'
      +'<span class="hr-unit">T/hr</span>'
      +'<button class="rng-btn rng-btn-set" onclick="setRangeRate('+mid+')">✓ Apply Range</button>'
      +'<button class="rng-btn rng-btn-clr" onclick="clearRangeRate('+mid+')">✕ Clear Range</button>'
      +(totalOvrs>0?'<button class="rng-btn" style="background:#1a0808;color:#6a2020;border-color:#2a1010" onmouseenter="this.style.color=\'#f47067\'" onmouseleave="this.style.color=\'#6a2020\'" onclick="clearAllHourRates('+mid+')">✕ Clear All</button>':'')
    +'</div>'
    +'<div class="rng-summary">'
      +buildRangeSummary(mid)
    +'</div>'
    +'</div>';

  return '<div class="hr-adj">'
    +'<div class="hr-adj-title">🕐 Hour-Specific Rate — Day '+day+' · '+m.n
    +(hasOvrs?' <span style="color:#e6b84a;font-size:9px">('+Object.keys(hourOvrs).length+' overrides today)</span>':'')+'</div>'
    +heatH
    +singleH
    +(hasOvrs?'<div style="font-size:9px;color:#3a5070;margin:4px 0 2px">This day\'s overrides (× to remove):</div>'+chipsH
             :'<div style="font-size:9px;color:#2a4060;padding:2px 0">No overrides for Day '+day+'. Default: '+rphDefault.toFixed(4)+' T/hr all 24 hours.</div>')
    +rangeH
    +'</div>';
}

function grvApply(mid){
  var rateEl=document.getElementById('gadj-rate-'+mid);
  var trkEl=document.getElementById('gadj-trk-'+mid);
  var initEl=document.getElementById('gadj-init-'+mid);
  var status=document.getElementById('gadj-status-'+mid);

  if(rateEl){
    var rate=parseFloat(rateEl.value);
    if(!isNaN(rate)&&rate>=0){
      if(!DAY_RATES[GRV_DAY])DAY_RATES[GRV_DAY]={};
      DAY_RATES[GRV_DAY][mid]=rate;
    }
  }
  if(trkEl){
    var trk=parseInt(trkEl.value)||0;
    if(!OVR[GRV_DAY]){
      // seed from current auto dispatch
      var r=RES[GRV_DAY-1];OVR[GRV_DAY]={};
      if(r)MATS.forEach(function(mm){OVR[GRV_DAY][mm.id]=(r.dpA[mm.id]||0)+(r.dpN[mm.id]||0);});
    }
    OVR[GRV_DAY][mid]=trk;
  }
  if(initEl&&GRV_DAY===1){
    var iv=parseFloat(initEl.value);
    if(!isNaN(iv)&&iv>=0)INIT[mid]=Math.min(M[mid].cap,iv);
  }
  runSim();
  buildGraphs();
  markUnsaved();
  toast('Day '+GRV_DAY+' \u00b7 '+M[mid].n+' updated \u2713');
}

function grvOptimize(mid){
  var m=M[mid];
  var status=document.getElementById('gadj-status-'+mid);
  // Auto-compute optimal trucks for this material on GRV_DAY
  // For RM: calculate trucks needed to reach 60-75% of cap
  // For WS: calculate trucks needed to empty as much as possible
  var r=RES[GRV_DAY-1];
  if(!r)return;
  var sn=r.sn[mid];
  var maxTrk=m.mp||(mid===7?7:DX[m.dk]);
  var optTrk=0;
  if(m.t==='RM'){
    // Current stock %: if below 60%, add trucks to reach 70%
    var target=m.cap*0.70;
    var cur=sn.v;
    var needed=Math.max(0,target-cur);
    optTrk=Math.min(maxTrk,Math.ceil(needed/m.pv));
    if(sn.p>=70)optTrk=0; // already good
  } else {
    // WS: dispatch as many as possible to minimize stock
    var cur2=sn.v;
    optTrk=Math.min(maxTrk,Math.ceil(cur2/m.pv));
  }
  // Apply
  var trkEl=document.getElementById('gadj-trk-'+mid);
  if(trkEl){trkEl.value=optTrk;trkEl.classList.add('grv-adj-changed');}
  // Set rate input hint
  var rateEl=document.getElementById('gadj-rate-'+mid);
  if(rateEl)rateEl.classList.remove('grv-adj-changed');
  if(status){
    status.textContent='Optimal: '+optTrk+' trucks';
    status.className='grv-adj-status ok';
  }
  toast('Optimized '+m.n+': '+optTrk+' trucks recommended');
}

function grvResetAdj(mid){
  // Remove day-specific rate override
  if(DAY_RATES[GRV_DAY]&&DAY_RATES[GRV_DAY][mid]!=null){
    delete DAY_RATES[GRV_DAY][mid];
    if(!Object.keys(DAY_RATES[GRV_DAY]).length)delete DAY_RATES[GRV_DAY];
  }
  // Remove truck override for this material this day
  if(OVR[GRV_DAY]&&OVR[GRV_DAY][mid]!=null){
    delete OVR[GRV_DAY][mid];
    if(!Object.keys(OVR[GRV_DAY]).length)delete OVR[GRV_DAY];
  }
  // Reset init if day 1
  if(GRV_DAY===1){
    INIT[mid]=+(M[mid].cap*0.35).toFixed(3); // rough default
  }
  runSim();
  buildGraphs();
  markUnsaved();
  toast('Day '+GRV_DAY+' \u00b7 '+M[mid].n+' reset to auto \u2713');
}
